<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceNow CSA 学習システム</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1c2b36;
    --sub: #5f7382;
    --accent: #1f8476;
    --accent-dark: #14655a;
    --accent-bg: #eaf5f3;
    --ok: #1f8476;
    --ng: #c0392b;
    --border: #dde4ea;
    --hover: #eef4f3;
    --code-bg: #1a2733;
    --code-text: #d4e8e3;
    --tab-bg: #ffffff;
    --tab-border: #dde4ea;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111b22;
      --card: #192430;
      --text: #dce8f0;
      --sub: #7a9aad;
      --accent: #25a090;
      --accent-dark: #1f8476;
      --accent-bg: #0e2822;
      --ok: #25a090;
      --ng: #e05c4a;
      --border: #253545;
      --hover: #1a2e3a;
      --code-bg: #0d1a22;
      --code-text: #c8e0d8;
      --tab-bg: #192430;
      --tab-border: #253545;
    }
  }
  :root[data-theme="dark"] {
    --bg: #111b22;
    --card: #192430;
    --text: #dce8f0;
    --sub: #7a9aad;
    --accent: #25a090;
    --accent-dark: #1f8476;
    --accent-bg: #0e2822;
    --ok: #25a090;
    --ng: #e05c4a;
    --border: #253545;
    --hover: #1a2e3a;
    --code-bg: #0d1a22;
    --code-text: #c8e0d8;
    --tab-bg: #192430;
    --tab-border: #253545;
  }
  :root[data-theme="light"] {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1c2b36;
    --sub: #5f7382;
    --accent: #1f8476;
    --accent-dark: #14655a;
    --accent-bg: #eaf5f3;
    --ok: #1f8476;
    --ng: #c0392b;
    --border: #dde4ea;
    --hover: #eef4f3;
    --code-bg: #1a2733;
    --code-text: #d4e8e3;
    --tab-bg: #ffffff;
    --tab-border: #dde4ea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.65;
    overflow-x: hidden;
    max-width: 100vw;
  }
  header {
    background: linear-gradient(135deg, #103c37, #1f8476);
    color: #fff; padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: .95rem; font-weight: 700; }
  header .sub { font-size: .78rem; opacity: .85; }

  /* ===== TAB BAR ===== */
  .tab-bar-wrap {
    background: var(--tab-bg);
    border-bottom: 1px solid var(--tab-border);
    position: sticky; top: 44px; z-index: 90;
    box-shadow: 0 2px 6px rgba(0,0,0,.06);
  }
  .tab-bar {
    max-width: 1100px; margin: 0 auto;
    display: flex; gap: 0; overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none; padding: 9px 16px;
    font: inherit; font-size: .82rem; font-weight: 600;
    background: none; border: none; border-bottom: 3px solid transparent;
    color: var(--sub); cursor: pointer;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--accent); background: var(--hover); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { max-width: 1100px; margin: 0 auto; padding: 14px 12px 60px; width: 100%; box-sizing: border-box; }

  /* ===== STUDY TAB ===== */
  .study-layout {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 20px;
    align-items: start;
  }
  .study-layout > *:last-child { min-width: 0; }
  .study-sidebar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    position: sticky;
    top: 90px;
  }
  .study-sidebar h3 {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--sub);
    padding: 4px 8px 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .domain-nav-btn {
    display: block; width: 100%;
    text-align: left; padding: 9px 12px;
    font: inherit; font-size: .83rem; font-weight: 500;
    background: none; border: none; border-radius: 8px;
    color: var(--text); cursor: pointer;
    transition: background .13s, color .13s;
    margin-bottom: 2px;
    line-height: 1.35;
  }
  .domain-nav-btn:hover { background: var(--hover); color: var(--accent); }
  .domain-nav-btn.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 700;
  }
  .domain-nav-btn .d-num {
    display: inline-block; width: 18px; height: 18px; line-height: 18px;
    font-size: .68rem; font-weight: 800; text-align: center;
    background: var(--accent); color: #fff; border-radius: 4px;
    margin-right: 7px; flex-shrink: 0;
    vertical-align: middle;
  }
  .domain-nav-btn.active .d-num { background: var(--accent-dark); }

  /* ===== NOTE CONTENT ===== */
  .note-content-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    min-height: 400px;
  }
  .note-body {
    max-width: 100%;
    line-height: 1.75;
    font-size: .95rem;
    color: var(--text);
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .note-body h1 {
    font-size: 1.4rem; font-weight: 800;
    color: var(--accent-dark);
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
    text-wrap: balance;
  }
  .note-body h2 {
    font-size: 1.1rem; font-weight: 700;
    color: var(--text);
    margin: 28px 0 10px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
    text-wrap: balance;
  }
  .note-body h3 {
    font-size: .95rem; font-weight: 700;
    color: var(--sub);
    margin: 20px 0 8px;
    text-wrap: balance;
  }
  .note-body p { margin-bottom: 10px; }
  .note-body ul, .note-body ol {
    padding-left: 1.4em; margin-bottom: 10px;
  }
  .note-body li { margin-bottom: 3px; }
  .note-body strong { font-weight: 700; color: var(--text); }
  .note-body em { font-style: italic; }
  .note-body code {
    font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
    font-size: .83em;
    background: var(--hover);
    color: var(--accent-dark);
    padding: 1px 5px; border-radius: 4px;
    border: 1px solid var(--border);
    word-break: break-all;
    overflow-wrap: break-word;
  }
  .note-body pre {
    font-family: "SFMono-Regular", "Consolas", "Menlo", monospace;
    font-size: .8rem;
    background: var(--code-bg);
    color: var(--code-text);
    padding: 14px 16px;
    border-radius: 10px;
    overflow-x: auto;
    margin: 14px 0;
    line-height: 1.55;
    white-space: pre;
    max-width: 100%;
  }
  .note-body pre code {
    background: none; border: none; padding: 0;
    color: inherit; font-size: inherit;
  }
  .note-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  .note-body table {
    width: 100%; border-collapse: collapse;
    font-size: .88rem; margin: 14px 0;
  }
  .note-body th {
    background: var(--hover);
    color: var(--sub); font-weight: 700; font-size: .78rem;
    letter-spacing: .04em; text-transform: uppercase;
    padding: 8px 12px; text-align: left;
    border-bottom: 2px solid var(--border);
  }
  .note-body td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .note-body tr:last-child td { border-bottom: none; }
  .note-body .table-wrap { overflow-x: auto; }

  /* Mobile sidebar pills */
  .study-pills { display: none; }

  @media (max-width: 768px) {
    .study-layout { grid-template-columns: 1fr; gap: 12px; }
    .study-sidebar { display: none; }
    .note-content-wrap {
      width: calc(100vw - 24px) !important;
      max-width: calc(100vw - 24px) !important;
      overflow: hidden;
    }
    main { padding-left: 12px !important; padding-right: 12px !important; }
    .study-pills {
      display: flex; gap: 8px; flex-wrap: nowrap;
      overflow-x: auto; scrollbar-width: none;
      padding: 4px 0 10px; margin-bottom: 4px;
    }
    .study-pills::-webkit-scrollbar { display: none; }
    .study-pill-btn {
      flex: none; padding: 7px 14px;
      font: inherit; font-size: .8rem; font-weight: 600;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 999px; color: var(--sub); cursor: pointer;
      transition: all .13s; white-space: nowrap;
    }
    .study-pill-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .note-content-wrap { padding: 18px 16px; }
  }

  /* ===== EXISTING STYLES ===== */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 12px;
  }
  h2 { font-size: 1.05rem; margin-bottom: 12px; }
  h3 { font-size: .95rem; margin-bottom: 8px; }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--border);
    background: var(--card); border-radius: 8px; padding: 10px 16px; color: var(--text);
    transition: background .15s;
  }
  button:hover { background: var(--hover); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { background: var(--accent-dark); }
  button.ghost { border: none; background: none; color: var(--sub); text-decoration: underline; padding: 4px; }
  button:disabled { opacity: .45; cursor: default; }
  .mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .mode-btn { text-align: left; padding: 16px; border-radius: 12px; }
  .mode-btn .t { font-weight: 700; display: block; margin-bottom: 4px; color: var(--accent-dark); }
  .mode-btn .d { font-size: .8rem; color: var(--sub); }
  table.progress { width: 100%; border-collapse: collapse; font-size: .85rem; }
  table.progress th, table.progress td { padding: 7px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  table.progress th { color: var(--sub); font-weight: 600; font-size: .75rem; }
  .bar { background: #e6ecef; border-radius: 6px; height: 8px; overflow: hidden; min-width: 80px; }
  .bar > div { height: 100%; background: var(--accent); border-radius: 6px; }
  .qmeta { font-size: .78rem; color: var(--sub); margin-bottom: 10px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
  .qtext { font-weight: 600; margin-bottom: 14px; font-size: 1rem; }
  .choice {
    display: block; width: 100%; text-align: left; margin-bottom: 8px; padding: 12px 14px;
    border-radius: 10px; border: 1.5px solid var(--border); background: var(--card);
  }
  .choice.selected { border-color: var(--accent); background: var(--accent-bg); }
  .choice.correct { border-color: var(--ok); background: var(--accent-bg); font-weight: 600; }
  .choice.wrong { border-color: var(--ng); background: #faeae8; }
  .expl {
    margin-top: 14px; padding: 14px; border-radius: 10px; font-size: .9rem;
    background: var(--accent-bg); border-left: 4px solid var(--accent);
  }
  .expl.ng { background: #fdf3f2; border-left-color: var(--ng); }
  .verdict { font-weight: 700; margin-bottom: 6px; }
  .verdict.ok { color: var(--ok); }
  .verdict.ng { color: var(--ng); }
  .nav-row { display: flex; justify-content: space-between; margin-top: 18px; gap: 8px; flex-wrap: wrap; }
  .timer { font-variant-numeric: tabular-nums; font-weight: 700; }
  .timer.warn { color: #ffd2ad; }
  .pill {
    display: inline-block; font-size: .72rem; padding: 2px 10px; border-radius: 999px;
    background: var(--accent-bg); color: var(--accent-dark); margin-right: 6px;
  }
  .score-big { font-size: 2.2rem; font-weight: 800; }
  .score-big.pass { color: var(--ok); }
  .score-big.fail { color: var(--ng); }
  .domain-select label {
    display: flex; gap: 8px; align-items: center; padding: 8px 10px; border-radius: 8px; cursor: pointer;
  }
  .domain-select label:hover { background: var(--hover); }
  .muted { color: var(--sub); font-size: .85rem; }
  .browse-item { border-bottom: 1px solid var(--border); padding: 14px 0; }
  .browse-item:last-child { border: none; }
  .browse-item .ans { color: var(--accent-dark); font-weight: 600; font-size: .88rem; margin-top: 6px; }
  .browse-item .ex { font-size: .85rem; color: var(--sub); margin-top: 4px; }
  .multi-note { font-size: .78rem; color: var(--ng); font-weight: 600; margin-bottom: 8px; }
  .mistake-item { border-bottom: 1px solid var(--border); padding: 10px 0; }
  .mistake-item:last-child { border: none; }
  .mistake-row { display: flex; align-items: center; gap: 8px; cursor: pointer; flex-wrap: wrap; }
  .mistake-row .pill { flex: none; }
  .mistake-text { flex: 1 1 160px; min-width: 120px; font-size: .88rem; }
  .mistake-stats { font-size: .78rem; color: var(--sub); white-space: nowrap; }
  .mistake-detail { display: none; margin-top: 8px; padding: 10px 12px; border-radius: 8px; background: var(--accent-bg); border-left: 4px solid var(--accent); font-size: .85rem; }
  .mistake-item.open .mistake-detail { display: block; }
  .mistake-detail .ans { color: var(--accent-dark); font-weight: 600; margin-bottom: 4px; }
  .mistake-detail .ex { color: var(--text); }
  .mock-tooltip {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: .76rem; line-height: 1.5;
    box-shadow: 0 4px 10px rgba(0,0,0,.14); pointer-events: none; z-index: 20;
    max-width: 200px;
  }
  .mock-badge {
    margin: 0 0 12px; padding: 8px 12px; border-radius: 8px;
    background: var(--accent-bg); color: var(--accent-dark); font-weight: 700; font-size: .85rem;
    display: inline-block;
  }
  footer { text-align: center; color: var(--sub); font-size: .75rem; padding: 20px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <div>
    <h1>ServiceNow CSA 学習システム</h1>
    <div class="sub">Certified System Administrator 試験対策<span style="font-size:.68rem;opacity:.75;margin-left:8px;padding:1px 7px;border:1px solid rgba(255,255,255,.4);border-radius:999px;white-space:nowrap">PDI: Zurich リリース準拠</span></div>
  </div>
  <div id="header-right"></div>
</header>

<div class="tab-bar-wrap">
  <div class="tab-bar" role="tablist">
    <button class="tab-btn active" id="tab-study"   role="tab" onclick="switchTab('study')"  >学習ノート</button>
    <button class="tab-btn"        id="tab-practice" role="tab" onclick="switchTab('practice')">分野別練習</button>
    <button class="tab-btn"        id="tab-mock"     role="tab" onclick="switchTab('mock')"    >模擬試験</button>
    <button class="tab-btn"        id="tab-review"   role="tab" onclick="switchTab('review')"  >弱点復習</button>
    <button class="tab-btn"        id="tab-browse"   role="tab" onclick="switchTab('browse')"  >全問一覧</button>
    <button class="tab-btn"        id="tab-home"     role="tab" onclick="switchTab('home')"    >ダッシュボード</button>
  </div>
</div>

<main id="app"></main>
<footer>問題データは questions.js で管理。進捗はこのブラウザの localStorage に保存されます。</footer>

<script>
// フォーマット:
// {
//   id: 一意の数値,
//   domain: 1-6 (出題分野),
//   q: "問題文",
//   choices: ["選択肢A", ...],
//   answer: [正解のインデックス(0始まり)],  // 複数選択は複数要素
//   expl: "解説"
// }
// domain: 1=Platform Overview 2=Instance Config 3=Collaboration
//         4=Self-Service & Automation 5=Database Management 6=Data Migration

const DOMAINS = {
  1: { name: "Platform Overview and Navigation", weight: 7 },
  2: { name: "Instance Configuration", weight: 11 },
  3: { name: "Configuring Applications for Collaboration", weight: 20 },
  4: { name: "Self-Service & Automation", weight: 20 },
  5: { name: "Database Management", weight: 27 },
  6: { name: "Data Migration and Integration", weight: 15 },
};

const QUESTIONS = [
  // ========== 分野1: Platform Overview and Navigation ==========
  {
    id: 101, domain: 1,
    q: "ServiceNowのメジャーリリースの命名規則と頻度として正しいものはどれか。",
    choices: [
      "都市名のアルファベット順・年2回",
      "動物名のアルファベット順・年1回",
      "都市名のアルファベット順・年4回",
      "バージョン番号のみ・随時"
    ],
    answer: [0],
    expl: "ServiceNowのメジャーリリースは都市名のアルファベット順(例: Xanadu→Yokohama→Zurich)で年2回リリースされる。動物名ではなく都市名であり、年4回ではなく年2回、バージョン番号だけの命名でもない。"
  },
  {
    id: 102, domain: 1,
    q: "Next Experience UI で、全アプリケーション・モジュールの一覧にアクセスするメニューはどれか。",
    choices: ["Favorites", "All", "History", "Workspaces"],
    answer: [1],
    expl: "「All」メニューが旧アプリケーションナビゲーターに相当し、全アプリケーション・モジュールにアクセスできる。Favoritesはお気に入り登録した項目のみ、Historyは閲覧履歴、Workspacesは業務別の専用画面一覧であり、全体を網羅する一覧ではない。"
  },
  {
    id: 103, domain: 1,
    q: "管理者が他のユーザーの権限や画面の見え方を確認したい。最も適切な方法はどれか。",
    choices: [
      "そのユーザーのパスワードを聞いてログインする",
      "Impersonate(ユーザー代理)機能を使う",
      "ACLを一時的に無効化する",
      "そのユーザーにスクリーンショットを依頼する"
    ],
    answer: [1],
    expl: "Impersonate機能でそのユーザーになりすまして見え方・権限を確認できる。adminまたはimpersonatorロールで実行可能。パスワードを聞き出す行為はセキュリティ上不適切で、ACLの一時無効化は他ユーザーへの影響が大きく実運用に適さず、スクリーンショット依頼では管理者自身が画面を直接検証できない。"
  },
  {
    id: 104, domain: 1,
    q: "リスト上部のブレッドクラム(パンくず)の説明として正しいものはどれか。",
    choices: [
      "各条件はORで結合される",
      "各条件は左から右にANDで結合され、クリックで途中まで条件を戻せる",
      "並び順の履歴を表示する",
      "管理者のみ表示される"
    ],
    answer: [1],
    expl: "ブレッドクラムは左から右にANDで結合された現在のフィルター条件を表し、途中の条件をクリックするとそこまでの状態に戻れる。ORでの結合や並び順履歴の表示ではなく、admin専用の機能でもない。"
  },
  {
    id: 105, domain: 1,
    q: "モジュール(Module)の説明として正しいものはどれか。",
    choices: [
      "テーブルの別名である",
      "アプリケーションメニュー配下の項目で、リストやフォーム等へのリンクとなる",
      "サーバーサイドスクリプトの単位である",
      "更新セットの構成要素である"
    ],
    answer: [1],
    expl: "モジュールはアプリケーションメニュー配下の1項目で、リスト表示・フォーム・URL・スクリプト実行などのリンクタイプを持ち、ロールで表示制御できる。テーブルの別名や、サーバーサイドスクリプトの単位、更新セットの構成要素ではない。"
  },
  {
    id: 106, domain: 1,
    q: "グローバル検索で完全一致検索をしたい場合の書き方はどれか。",
    choices: ["*キーワード", "\"キーワード\"", "%キーワード%", "=キーワード"],
    answer: [1],
    expl: "ダブルクォートで囲むと完全一致(フレーズ)検索になる。*は部分一致用のワイルドカードであり、%や=はServiceNowのグローバル検索の構文ではない。"
  },
  {
    id: 107, domain: 1,
    q: "ユーザーが自分のタイムゾーンや表示言語を変更する場所として適切なのはどれか。",
    choices: [
      "システムプロパティ",
      "ユーザーメニューの Preferences(設定)",
      "sys_dictionary",
      "Update Set"

- 有効化するとデモデータを含められる場合がある(本番では通常含めない)。

## 6. Update Set(更新セット)

構成変更(カスタマイズ)をインスタンス間で移送するための仕組み。**CSA頻出**。

- **記録されるもの**: 構成レコード(フォームレイアウト、ビジネスルール、ACL等の「カスタマイズ」)。
- **記録されないもの**: **データ(タスクレコード等)・スケジュールジョブの実行結果・ホームページ/ダッシュボード(手動追加が必要な場合あり)・新規テーブルのデータ**。
- 流れ: 開発環境で Update Set 作成 → **Complete** に変更 → テスト環境で **Retrieve(取得)** → **Preview(プレビュー)** で衝突検出 → **Commit(コミット)**。
- **Default update set**: 更新セットを指定しないときの受け皿。移送用には使わない。
- 複数の更新セットは**バッチ(親子関係)**にまとめて一括移送できる。
- プレビューで衝突(Collision)が出たら、Accept/Skip を判断してからコミット。

## 7. 開発プロセス(インスタンス構成)

- 典型構成: **開発(Dev) → テスト(Test) → 本番(Prod)** の3インスタンス。
- カスタマイズは Dev で行い、Update Set で昇格。本番で直接変更しない。
- **クローン(Clone)**: 本番インスタンスのデータ・構成を下位環境へコピーする機能(逆方向はしない)。

## 8. 多言語・ローカライゼーション

- 言語プラグイン(I18N)を有効化するとUIの多言語化が可能。
- ユーザーごとに言語・タイムゾーン・日付書式を設定できる。

- Update Set の移送フロー(Complete → Retrieve → Preview → Commit)
- Form Layout と Form Design の違い、ビューの概念
- プラグインは基本的に無効化できない
- クローンは本番→下位環境の方向

## Scheduled Jobs（スケジュールジョブ）

定期実行するスクリプト（テーブル: sys_trigger / sysauto_script）。

**設定項目:**
- \`Run\`: 実行頻度（Daily / Weekly / Monthly / Once / On Demand / Periodically）
- \`Run time\`: 実行時刻
- \`Script\`: 実行するGlideScriptコード

**用途例:**
- 夜間バッチ処理（古いレコードのクローズ）
- 定期レポート生成
- Performance AnalyticsのIndicatorデータ収集

**Scheduled Importとの違い:**
- Scheduled Import: 外部データの定期取り込み（Import Set使用）
- Scheduled Job: 任意のサーバーサイドスクリプトを定期実行

## Application Scope（スコープ）

**Global スコープ vs スコープドアプリ:**
- \`Global\`: 全アプリケーションからアクセス可能な共通領域
- \`Scoped App\`: 独自の名前空間を持つ分離されたアプリ（例: x_myco_myapp）

**スコープの切り替え:**
- 右上のアプリケーションセレクター（Application Pill）でスコープを切り替え
- スコープ外のリソースへのアクセスはApplication Accessで制御

**スコープドアプリのプレフィックス:**
- カスタムテーブル: \`x_ベンダーコード_アプリ名_テーブル名\`
- ※ グローバルスコープのカスタムテーブルは \`u_\` プレフィックス

## 1. ユーザー・グループ・ロール

ユーザー(sys_user)、グループ(sys_user_group)、ロール(sys_user_role)の3層構造。ロールはグループに付与してユーザーはグループに所属させるのがベストプラクティス。security_adminはelevate roleで一時昇格して使う。

## 2. タスクテーブル(Task Table)

taskテーブルが親で、Incident/Problem/Change/Requestなどが拡張。共通フィールドを継承。

## 3. Visual Task Board(VTB)

Flexible(自由レーン)、Guided(フィールド連動)、Freeform(自由追加)の3種類。

## 4. 通知(Notifications)

3要素: When to send / Who will receive / What it will contain。イベント駆動(gs.eventQueue())も可。

## 5. レポートとダッシュボード

レポートは「今」のデータ、Performance Analytics(PA)は「経時変化」のトレンド分析。

## 6. ナレッジ管理(Knowledge Management)

KB > Category > Article の階層。Draft → Review → Published → Retired のライフサイクル。User Criteria で Can Read / Can Contribute を制御。

## 7. Connect / チャット

Work notes(内部) / Additional comments(顧客向け)の使い分け。

## 8. Client Scripts

クライアントサイドで実行されるJavaScript。フォームの動的制御に使用。

**種類:**
- \`onLoad\`: フォーム読み込み時に実行
- \`onChange\`: フィールド値変更時に実行
- \`onSubmit\`: フォーム送信(保存)時に実行
- \`onCellEdit\`: リストのインライン編集時に実行

**g_form API (フォーム操作):**
- \`g_form.getValue('field')\`: フィールド値を取得
- \`g_form.setValue('field', value)\`: フィールド値をセット
- \`g_form.setMandatory('field', true/false)\`: 必須/任意を切替
- \`g_form.setVisible('field', true/false)\`: 表示/非表示を切替
- \`g_form.setReadOnly('field', true/false)\`: 読み取り専用を切替
- \`g_form.addInfoMessage('msg')\`: 情報メッセージを表示
- \`g_form.clearMessages()\`: メッセージをクリア

**g_user API (ユーザー情報):**
- \`g_user.hasRole('role_name')\`: ロール保持確認
- \`g_user.getFullName()\`: フルネーム取得
- \`g_user.getUserID()\`: sys_id取得

**UI Policy vs Client Script:**
- UI Policy: コードなしで表示/必須/読み取り専用を制御（推奨）
- Client Script: より複雑な条件ロジックやAPIコール時に使用

## 9. Performance Analytics (PA)

**PA Indicators (指標/KPI):**
- 測定対象を定義するKPI（例: 未解決インシデント数）
- \`Automated\` タイプ: データを自動収集するスクリプト
- \`Manual\` タイプ: 手動入力

**PA Breakdowns (分解):**
- Indicatorのデータを切り口で分解（例: Priority別、Assignment Group別）
- BreakdownとIndicatorをマッピングして多角分析

**PA Scheduled Jobs:**
- Indicatorのデータを定期収集するジョブ
- 収集頻度: 日次/週次/月次等

**Scores / Targets / Thresholds:**
- Score: 実測値
- Target: 目標値
- Threshold: アラート閾値

**PA Dashboards:** Scorecard(時系列グラフ)とWidgetで可視化

## 10. 通知詳細

**Notification Digest:** 複数の通知をまとめてバッチ送信（メール爆発防止）

**Notification Subscriptions:** ユーザーが通知のオン/オフを自分で設定できる仕組み

**Notification Devices:** Email / SMS / Push Notification の送信先デバイス

**通知トリガー条件:**
- レコードの Insert/Update 時
- 特定フィールドの変更時
- イベント発生時 (gs.eventQueue())

**通知テンプレート変数:** \`\${field_name}\` でフィールド値を本文に挿入

## 11. グループ詳細

**グループタイプ:**
- Assignment Group: タスクの担当グループ
- Notification Group: 通知の送信先グループ
- 両方兼用も可

**ロール継承:** グループに付与したロールはメンバー全員に継承される

**Contains Roles:** ロールが別のロールを包含する（例: admin は itil を含む）

**Manager:** グループのマネージャーフィールド。承認フローで参照されることがある

### タスク1: ユーザー・グループ・ロールの付与を体験する

6. **確認**: test.csa でログインし直し、Incident モジュールが表示されることを確認する（itil ロールの効果）

### タスク2: Client Scriptを作成してg_form APIを試す

1. **All → System Definition → Client Scripts** を開く
2. 「New」をクリック。Table: \`incident\`、Type: \`onChange\`、Field name: \`priority\` を指定
3. Script 欄に以下を入力して保存:
   \`\`\`
   function onChange(control, oldValue, newValue, isLoading) {
     if (newValue == '1') {
       g_form.setMandatory('short_description', true);
       g_form.addInfoMessage('優先度1: 説明を必ず入力してください');
     } else {
       g_form.setMandatory('short_description', false);
       g_form.clearMessages();
     }
   }
   \`\`\`
4. Incidentフォームを開き、Priority を「1 - Critical」に変更して動作を確認する

### タスク3: 通知(Notification)の3要素を確認する

1. **All → System Notification → Email → Notifications** を開く
2. 既存の通知（例: \`Incident opened for user\`）をクリックして開く
3. 以下の3タブを順に確認する:
   - **When to send** タブ: 送信条件（テーブル名・条件フィルター・イベント）
   - **Who will receive** タブ: 受信者（Users / Groups / フィールド値）
   - **What it will contain** タブ: 件名と本文テンプレート（\`\${field_name}\` 変数）

## 12. UI Actions

フォーム上のボタン・コンテキストメニュー・関連リンクをカスタマイズする仕組み（テーブル: sys_ui_action）。

**種類:**
- \`Form button\`: フォーム上部のボタン
- \`Form context menu\`: 右クリックメニュー
- \`Form link\`: フォーム下部の関連リンク
- \`List banner button\`: リスト上部のボタン
- \`List context menu\`: リストの右クリックメニュー

**UI ActionとACLの関係:**
- UI Actionの表示制御はACLの \`execute\` Operationで行う
- UI Policy / Client Script との違い: UI Actionはサーバーサイド処理のトリガー

**Client Script との使い分け:**
- Client Script: フォームの表示制御（フィールドの必須/表示/読み取り専用）
- UI Action: ボタンクリック時のサーバーサイド処理実行

## 13. Inbound Email Actions

受信メールをトリガーにレコードを作成・更新するルール（テーブル: sys_email_action）。

**動作フロー:**
受信メール → メールボックス → Inbound Email Action → レコード作成/更新

**主な設定:**
- \`When to run\`: 条件（新規メール / 既存チケットへの返信）
- \`Action\`: insert（新規作成）/ update（更新）/ ignore
- \`Target table\`: 操作対象テーブル（例: incident）
- \`Reply separator\`: 返信メールの本文区切り文字

**典型的な使用例:**
- ユーザーがメール送信 → Incidentが自動作成
- 担当者がメール返信 → Work Notesに自動追記

## 試験との接続

「ロールをユーザーに直接付与するのとグループ経由で付与するのはどちらが推奨か」→ グループ経由が推奨。1か所の変更が全メンバーに波及するため管理が効率的。

「通知の受信者をフィールド値（例: Assigned to）で指定するにはどこで設定するか」→ Notificationの「Who will receive」タブの「Fields」欄でテーブルのユーザー型フィールドを指定する。

「ナレッジ記事の Can Read と Can Contribute は何で制御するか」→ User Criteria で制御する。ロールや部署単位でのアクセス制御。

**タスク1: カタログアイテムを作成して注文する**

1. \`All → Service Catalog → Catalog Definitions → Maintain Items\` を開く
2. \`New\` をクリック。Name に「テスト貸出PC」、Catalogs に「Service Catalog」、Category に任意のカテゴリを設定して保存
3. 関連リスト \`Variables\` で \`New\` をクリック。Type を \`Single Line Text\`、Question を「用途を記入してください」として保存
4. \`Try It\` ボタンで注文を実行
5. \`All → Service Catalog → Open Records → Requests\` を開き、生成されたREQ/RITM/SCTASKの親子構造を確認する

**タスク2: Record Producerを作成する**

1. \`All → Service Catalog → Catalog Definitions → Record Producers\` を開く
2. \`New\` をクリック。Name に「インシデント報告フォーム」、Table に \`incident\` を選択して保存
3. Variables タブで \`New\` → Short Description 用の変数を作成し、Script タブで \`current.short_description = producer.変数名;\` と記述
4. Service Portal でフォームを検索・送信し、\`All → Incident → All\` に新規インシデントが作成されたことを確認する
   - 確認ポイント: REQやRITMは生成されず、incidentテーブルに直接レコードが作られること

**タスク3: Flow Designer でApprovalフローを作成する**

1. \`All → Flow Designer\` を開き、\`New → Flow\` をクリック
2. Flow Name に「PC承認フロー」と入力し、\`Add a trigger → Record → Created\` を選択。Table は \`sc_req_item\` を指定
3. \`Add an Action → ServiceNow Core → Ask for Approval\` を選択
4. Activate してカタログアイテムを注文し、\`All → My Approvals\` に承認依頼が届いていることを確認する

**タスク4: SLA Definitionを作成して動作を確認する**

1. \`All → SLA → SLA Definitions → New\` を開く
2. Name に「RITM 2時間SLA」、Table に \`sc_req_item\`、Duration に \`2 Hours\` を設定
3. Start condition を \`State is Open\`、Stop condition を \`State is Closed Complete\` に設定して保存

## Catalog UI Policy / Catalog Client Script

カタログアイテム専用の UI Policy / Client Script。**通常のものとは別テーブルで管理される。**

**Catalog UI Policy（catalog_ui_policy）:**
- 適用対象: サービスカタログのフォームのみ
- 通常のUI Policy（sys_ui_policy）はカタログフォームに効かない
- 設定場所: カタログアイテムレコードの「Catalog UI Policies」関連リスト
- Variable（変数）に対して必須/表示/読み取り専用を制御

**Catalog Client Script（catalog_script_client）:**
- 適用対象: サービスカタログのフォームのみ
- 通常のClient Script（sys_script_client）はカタログフォームに効かない
- 種類: onLoad / onChange / onSubmit（カタログ専用）
- \`g_form\` APIは同様に使用可能

**なぜ別物か:**
カタログアイテムのフォームはVariableで構成されており、通常のテーブルフィールドとは異なる仕組みのため。

## SLA Business Time（就業時間スケジュール）

SLAの計時が就業時間のみか24時間かを制御する設定。

**Schedule フィールド:**
- \`8-5 weekdays\` などのスケジュールを指定
- SLAは就業時間内のみカウントされる（営業時間外は一時停止）
- 未指定の場合は24時間365日でカウント

**Timezone:** SLAの計時に使うタイムゾーンを指定可能

## 試験との接続

「Record ProducerとCatalog Itemの違いは何か」→ Record Producerは任意テーブルへ直接レコード作成。REQ/RITMは生成されない。

「注文後に作成されるレコードの親子関係はどれか」→ REQ(sc_request) > RITM(sc_req_item) > SCTASK(sc_task)。

「Flow DesignerのSubflowとFlowの違いは何か」→ SubflowはTriggerを持たない。Flowから呼び出す再利用部品。

「SLAが一時停止(Pause)するのはどの条件が設定されている場合か」→ Pause condition フィールドに条件が設定されている場合。Start/Stop/Pauseは独立したフィールド。

「Variable Setを使う主な目的はどれか」→ 変数の定義を1か所で管理して複数アイテムに再利用するため。

  5: `# 分野5: Database Management(配点 27%・最重要)

## 1. データスキーマの基本

全テーブル定義はsys_db_object。フィールド定義(辞書)はsys_dictionary。ラベルはsys_documentation。sys_idは32文字GUIDで全レコードに存在。

**sys_db_objectの主要フィールド:**
- \`name\`: テーブルの物理名（例: incident）
- \`label\`: 表示名（例: Incident）
- \`super_class\`: 親テーブル（Extends）
- \`is_extendable\`: 子テーブルを作れるか
- \`accessible_from\`: アクセス可能なスコープ

**Application Access（ACLとは別レイヤー）:**
- sys_db_objectの「Application Access」タブで設定
- \`Can read\` / \`Can create\` / \`Can update\` / \`Can delete\` を他スコープに許可するか制御
- ACLはレコード単位の権限、Application Accessはスコープ間のアクセス許可
- スコープドアプリからGlobalテーブルを操作するにはApplication Accessが必要

**テーブル作成方法:**
- Studio（スコープドアプリ開発）
- sys_db_object.list → New（グローバル）
- Schema Map（視覚的なリレーション確認・作成）

## 2. テーブルの拡張(継承)

taskがIncident/Problem/Change等の親。cmdb_ciがCI系の親。sys_userはtask継承ツリーとは無関係の独立した系統(taskの拡張ではない)。親のリストには子のレコードも表示される。新規テーブルにはu_プレフィックス。

## 3. フィールドタイプと参照

Reference(1対多)、List(複数参照)、Choice(sys_choiceで管理)。Dot-walkingで参照先フィールドにアクセス(例: caller_id.company.name)。

## 4. リレーションシップ

1対多=Reference、多対多=m2mテーブル、Database View=JOIN(読み取り専用)。

## 5. CMDB

CI基底テーブルはcmdb_ci。CIリレーションシップはcmdb_rel_ciテーブル。

## 6. ACL(アクセス制御) — 最頻出

評価順序: テーブルレベル(具体→親→ワイルドカード)→フィールドレベル(具体→ワイルドカード)。両方パスしてアクセス可能。ACL変更にはsecurity_adminへのelevate roleが必要。条件3種類: ロール/条件(フィルター)/スクリプト。

**ACL Operation種類（必須）:**
- \`read\`: レコード/フィールドの読み取り
- \`write\`: 既存レコードのフィールド更新
- \`create\`: 新規レコードの作成
- \`delete\`: レコードの削除
- \`execute\`: UI Actionの実行（ボタン・コンテキストメニュー専用）
- \`report\`: レポートでのテーブル使用

**ACLのデフォルト動作（最重要・試験頻出）:**
- テーブルにACLが**1件も存在しない** → **アクセス許可**（デフォルト許可）
- ACLが存在するが**条件を1つも満たさない** → **アクセス拒否**
- ACLが存在し**いずれか1つを満たす** → **アクセス許可**
- ※「ACLがないから安全」は誤り。ACLを作った瞬間に他のACLを満たさないユーザーは拒否される

**ACLスクリプトフィールド:**
- \`answer\` 変数に \`true\` または \`false\` をセットして返す
- \`current\` でカレントレコードを参照
- \`gs.hasRole('role')\` でロールチェック
- \`answer = true;\` でアクセス許可

**ACL条件の評価（AND条件）:**
- ロール / 条件(フィルター) / スクリプト の**3つすべてがtrueのときのみACL通過**
- いずれか1つでもfalseなら拒否

**admin ロール:** ACLを無条件でバイパス（管理者は全ACLを通過）

**行レベルセキュリティ（Row-Level Security）:**
- テーブルACLのConditionやScriptで \`current\` を使うことでレコード単位のアクセス制御が可能
- 例: \`current.caller_id == gs.getUserID()\` → 自分が登録したレコードのみ読める

## 7. UI Policy / Data Policy / Business Rule

UI Policy=フォームのみ。Data Policy=全入力経路(インポート・API含む)。Business Ruleはサーバーサイドのinsert/update/delete/queryロジック。

## 8. Business Rule 詳細

**実行タイミング(When):**
- \`Before\`: DB保存前に実行。フィールド値の変更や処理のアボートに使用
- \`After\`: DB保存後に実行。他レコードの更新などに使用
- \`Async\`: 非同期実行。メール送信など重い処理に使用
- \`Display\`: フォーム表示前に実行。スクラッチパッドでデータを渡す

**current オブジェクト:**
- \`current.field_name\`: フィールドの現在値を取得/設定
- \`current.getValue('field')\`: 文字列として取得
- \`current.setValue('field', value)\`: 値をセット

**previous オブジェクト:**
- \`previous.field_name\`: 更新前の古い値を参照（Beforeのupdate時のみ有効）
- \`previous.state\`: 変更前のstateフィールド値

**setAbortAction(true):**
- \`current.setAbortAction(true)\`: DB保存をアボートしロールバック
- \`gs.addErrorMessage('メッセージ')\`: ユーザーへエラーメッセージ表示
- 組み合わせてバリデーションロジックを実装:
  \`\`\`
  if (current.state == '3' && current.assigned_to.nil()) {
    current.setAbortAction(true);
    gs.addErrorMessage('担当者を指定してください');
  }
  \`\`\`

**Scratchpad オブジェクト:**
- \`g_scratchpad.key = value\`: Display Business RuleからClient Scriptにデータを渡す

## 9. GlideRecord API

サーバーサイドでテーブルを操作するJavaScript API。

**単一レコード取得:**
\`\`\`
var gr = new GlideRecord('incident');
gr.get('sys_id_value');
// または
gr.get('number', 'INC0000001');
\`\`\`

**クエリ実行:**
\`\`\`
var gr = new GlideRecord('incident');
gr.addQuery('state', '1');              // state = 1
gr.addQuery('priority', '<', '3');      // priority < 3
gr.addEncodedQuery('active=true^state=1'); // エンコードクエリ
gr.setLimit(10);                        // 件数制限
gr.orderBy('priority');                 // 昇順
gr.orderByDesc('sys_created_on');       // 降順
gr.query();
while (gr.next()) {
  // レコード処理
  var val = gr.getValue('short_description'); // 文字列取得
  var disp = gr.getDisplayValue('state');     // 表示値取得
}
\`\`\`

**OR条件:**
\`\`\`
var qc = gr.addQuery('state', '1');
qc.addOrCondition('state', '2');   // state=1 OR state=2
\`\`\`

**レコード操作:**
\`\`\`
var gr = new GlideRecord('incident');
gr.initialize();
gr.setValue('short_description', '新規インシデント');
var sysId = gr.insert();           // 作成。sys_idを返す

// 更新
gr.get(sysId);
gr.setValue('state', '2');
gr.update();

// 削除
gr.deleteRecord();
\`\`\`

**参照フィールドのトラバース:**
\`\`\`
gr.caller_id.getRefRecord();  // 参照先レコードを取得
gr.getValue('caller_id.email'); // dot-walkで値取得
\`\`\`

## 10. テーブルと辞書の詳細

**Auto Number (自動番号):**
- Prefix: 番号のプレフィックス（例: INC）
- Next value: 次に付与される数値
- Padding: 桁数（0埋め）

**Dictionary Entry の主なフィールド:**
- Type: 文字列/整数/日付/Reference等
- Max length: 最大文字数
- Default value: デフォルト値
- Mandatory: 必須フラグ

**Reference フィールド:**
- Reference qualifier: 参照先レコードを絞り込む条件スクリプト

**Choice リスト:**
- sys_choice テーブルで管理
- Dependent field: 別フィールドの値に連動して選択肢を絞り込む

**テーブル継承:**
- Extends table: 親テーブルを指定
- 親フィールドは子テーブルに自動的に継承
- sys_metadata: 全設定レコードの基底テーブル

**辞書オーバーライド:**
- 子テーブルだけフィールド属性を変更（親の定義はそのまま）
- 例: 子テーブルでshort_descriptionを必須化

## 11. Script Include

サーバーサイドで再利用可能なスクリプトライブラリ（テーブル: sys_script_include）。

**特徴:**
- Business RuleやFlow Designerから呼び出して使う
- ClientCallable: trueにするとクライアントスクリプトからも呼び出し可能
- Application Scopeに紐づく

**基本構造:**
\`\`\`
var MyUtils = Class.create();
MyUtils.prototype = {
  initialize: function() {},
  
  myMethod: function(param) {
    var gr = new GlideRecord('incident');
    gr.addQuery('state', param);
    gr.query();
    return gr.getRowCount();
  },
  
  type: 'MyUtils'
};
\`\`\`

**呼び出し方（Business Ruleから）:**
\`\`\`
var util = new MyUtils();
var count = util.myMethod('1');
\`\`\`

## 12. GlideAggregate API

COUNT/SUM/AVG等の集計を効率的に実行するAPI（GlideRecordより高速）。

\`\`\`
var ga = new GlideAggregate('incident');
ga.addQuery('active', 'true');
ga.addAggregate('COUNT');           // 件数カウント
ga.groupBy('priority');             // 優先度別に集計
ga.query();
while (ga.next()) {
  var priority = ga.getValue('priority');
  var count = ga.getAggregate('COUNT');
  gs.info('Priority ' + priority + ': ' + count);
}
\`\`\`

**GlideRecord vs GlideAggregate:**
- GlideRecord: レコードの中身を処理したいとき
- GlideAggregate: 件数・合計・平均だけ知りたいとき（全レコード取得不要）

## 13. GlideSystem (gs) API まとめ

\`gs\` オブジェクトはサーバーサイドスクリプト全般で使用可能。

**ユーザー情報:**
- \`gs.getUserID()\`: 現在ユーザーのsys_id
- \`gs.getUserName()\`: ユーザーID（login名）
- \`gs.getUser().getFullName()\`: フルネーム
- \`gs.hasRole('role')\`: ロール保持確認（trueなら保持）

**メッセージ:**
- \`gs.addInfoMessage('msg')\`: 情報メッセージ表示
- \`gs.addErrorMessage('msg')\`: エラーメッセージ表示
- \`gs.info('msg')\` / \`gs.warn('msg')\` / \`gs.error('msg')\`: ログ出力（推奨）
- \`gs.log()\`: 旧来のログAPI（**非推奨**。試験では gs.info() が正解になることが多い）

**システム情報:**
- \`gs.getProperty('property.name')\`: System Propertyの値取得
- \`gs.nowDateTime()\`: 現在日時（GMT）
- \`gs.eventQueue('event.name', current)\`: イベントキューに追加

## 14. Journal フィールド（Work Notes / Comments）

**フィールドタイプ: journal / journal_input**
- \`work_notes\`: 内部メモ（担当者のみ）
- \`comments\` (Additional Comments): 顧客向け追記
- **追記式**: 既存内容は変更不可、新しい内容が上に追加される
- **読み取り専用**: 過去のエントリーは編集・削除不可
- **sys_journal_field**: Journalフィールドの内容を格納するテーブル

## 15. 監査・辞書オーバーライド

**Auditing**: sys_auditに変更履歴を記録（テーブルごとに有効化必要）。

**辞書オーバーライド**: 子テーブルだけ属性変更（親の定義は変えない）。

【スキーマ層】

/* ===== MARKDOWN RENDERER ===== */
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function inlineFormat(s) {
    s = escHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  function buildUL(listLines, idx, minIndent) {
    let out = '<ul>';
    while (idx < listLines.length) {
      const indent = listLines[idx].match(/^( *)/)[1].length;
      if (indent < minIndent) break;
      if (indent === minIndent) {
        const text = listLines[idx].replace(/^ *- /, '');
        idx++;
        if (idx < listLines.length) {
          const nextIndent = listLines[idx].match(/^( *)/)[1].length;
          if (nextIndent > minIndent) {
            const sub = buildUL(listLines, idx, nextIndent);
            out += '<li>' + inlineFormat(text) + sub.html + '</li>';
            idx = sub.nextIdx;
          } else {
            out += '<li>' + inlineFormat(text) + '</li>';
          }
        } else {
          out += '<li>' + inlineFormat(text) + '</li>';
        }
      } else {
        idx++;
      }
    }
    out += '</ul>';
    return { html: out, nextIdx: idx };
  }

  while (i < lines.length) {
    const line = lines[i];

    // fenced code block
    if (line.startsWith('```')) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        code += escHtml(lines[i]) + '\n';
        i++;
      }
      html += '<pre><code>' + code + '</code></pre>';
      i++;
      continue;
    }

    // heading
    if (/^#{1,3} /.test(line)) {
      const m = line.match(/^(#{1,3}) (.*)/);
      const level = m[1].length;
      const text = inlineFormat(m[2]);
      html += '<h' + level + '>' + text + '</h' + level + '>';
      i++;
      continue;
    }

    // horizontal rule
    if (/^---+$/.test(line.trim())) {
      html += '<hr>';
      i++;
      continue;
    }

    // table
    if (line.startsWith('|') && i + 1 < lines.length && lines[i+1].match(/^\|[\s\-|]+\|$/)) {
      const headers = line.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(h => '<th>' + inlineFormat(h.trim()) + '</th>').join('');
      i += 2;
      let rows = '';
      while (i < lines.length && lines[i].startsWith('|')) {
        const cells = lines[i].split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(c => '<td>' + inlineFormat(c.trim()) + '</td>').join('');
        rows += '<tr>' + cells + '</tr>';
        i++;
      }
      html += '<div class="table-wrap"><table><thead><tr>' + headers + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
      continue;
    }

    // unordered list (with nesting support)
    if (/^\s*- /.test(line)) {
      const listLines = [];
      while (i < lines.length && /^\s*- /.test(lines[i])) {
        listLines.push(lines[i]);
        i++;
      }
      const baseIndent = listLines[0].match(/^( *)/)[1].length;
      const result = buildUL(listLines, 0, baseIndent);
      html += result.html;
      continue;
    }

    // ordered list
    if (/^\d+\. /.test(line)) {
      let items = '';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        const text = lines[i].replace(/^\d+\. /, '');
        items += '<li>' + inlineFormat(text) + '</li>';
        i++;
      }
      html += '<ol>' + items + '</ol>';
      continue;
    }

    // blank line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // paragraph
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' &&
           !lines[i].startsWith('#') && !lines[i].startsWith('|') &&
           !lines[i].startsWith('```') && !/^\s*- /.test(lines[i]) &&
           !/^\d+\. /.test(lines[i]) && !/^---+$/.test(lines[i].trim())) {
      para += (para ? ' ' : '') + lines[i];
      i++;
    }
    if (para) html += '<p>' + inlineFormat(para) + '</p>';
  }

  return html;
}

const STORE_KEY = "csa_progress_v1";
const SPACED_INTERVALS = [3, 7, 14, 30, 60];
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; }
}
function saveProgress(p) { localStorage.setItem(STORE_KEY, JSON.stringify(p)); }
function recordAnswer(qid, correct) {
  const p = loadProgress();
  const e = p[qid] || { a: 0, c: 0, w: false, stg: 0, due: 0 };
  e.a++; if (correct) e.c++;
  e.w = !correct;
  if (correct) {
    e.stg = (e.stg || 0) + 1;
    const days = SPACED_INTERVALS[Math.min(e.stg - 1, SPACED_INTERVALS.length - 1)];
    e.due = Date.now() + days * 86400000;
  } else {
    e.stg = 0;
    e.due = Date.now() + 1 * 86400000;
  }
  p[qid] = e;
  saveProgress(p);
}
function getDueReviewIds() {
  const p = loadProgress();
  const now = Date.now();
  const ids = [];
  for (const qid in p) {
    const e = p[qid];
    if (!e || !(e.a > 0)) continue;
    if (e.due === undefined || e.due === null || e.due <= now) ids.push(Number(qid));
  }
  return ids;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sameSet(a, b) {

          <span class="t">今日の復習 (${dueCount}問)</span>
          <span class="d">間隔反復で記憶を定着。期限が来た問題を再演習</span>
        </button>
      </div>
    </div>
    ${buildMistakeSection()}`;
}

/* ===== よく間違える問題 TOP10 ===== */
function truncate60(s) {
  const str = String(s);
  return str.length > 60 ? str.slice(0, 60) + "…" : str;
}
function getTopMistakes() {
  const p = loadProgress();
  const list = [];
  for (const qid in p) {
    const e = p[qid];
    const a = e.a || 0, c = e.c || 0;
    const wrong = a - c;
    if (wrong >= 1) list.push({ qid, a, c, wrong, rate: a ? wrong / a : 0 });
  }
  list.sort((x, y) => (y.wrong - x.wrong) || (y.rate - x.rate));
  return list.slice(0, 10);
}
function buildMistakeSection() {
  const top = getTopMistakes();
  if (top.length === 0) return "";
  let items = "";
  for (const m of top) {
    const q = QUESTIONS.find(qq => qq.id === Number(m.qid));
    if (!q) continue;
    items += `<div class="mistake-item" id="mistake-item-${q.id}">
      <div class="mistake-row" onclick="toggleMistake(${q.id})">
        <span class="pill">分野${q.domain}</span>
        <span class="mistake-text">${esc(truncate60(q.q))}</span>
        <span class="mistake-stats">誤答 ${m.wrong}回 / 挑戦 ${m.a}回</span>
      </div>
      <div class="mistake-detail">
        <div class="ans">正解: ${q.answer.map(x => esc(q.choices[x])).join(" / ")}</div>
        <div class="ex">${esc(q.expl)}</div>
      </div>
    </div>`;
  }
  return `<div class="card">
    <h2>よく間違える問題 TOP10</h2>
    ${items}
  </div>`;
}
function toggleMistake(qid) {
  const el = document.getElementById(`mistake-item-${qid}`);
  if (el) el.classList.toggle("open");
}

/* ===== 模擬試験スコアの推移グラフ ===== */
function fmtMD(ts) {
  const d = new Date(ts);
  return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`;
}
function weakestDomain(perDomain) {
  let worstKey = null, worstRate = Infinity;
  for (const d in perDomain || {}) {
    const e = perDomain[d];
    const rate = e.t ? e.c / e.t : 1;
    if (rate < worstRate) { worstRate = rate; worstKey = d; }
  }
  if (worstKey === null) return "—";
  const name = DOMAINS[worstKey] ? DOMAINS[worstKey].name : "";
  return `分野${worstKey}: ${name}`;
}
function buildMockHistorySection() {
  const hist = loadMockHistory();
  mockHistoryChartData = hist;
  if (hist.length === 0) return "";

  const n = hist.length;
  const plotLeft = 40, plotRight = 520, plotTop = 16, plotBottom = 164;
  const xOf = i => n > 1 ? plotLeft + i * (plotRight - plotLeft) / (n - 1) : (plotLeft + plotRight) / 2;
  const yOf = score => plotBottom - (Math.max(0, Math.min(100, score)) / 100) * (plotBottom - plotTop);

  let gridHtml = "";
  [0, 25, 50, 75, 100].forEach(v => {
    const y = yOf(v);
    gridHtml += `<line x1="${plotLeft}" y1="${y}" x2="${plotRight}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    gridHtml += `<text x="${plotLeft - 8}" y="${y + 3}" text-anchor="end" font-size="9" fill="var(--sub)">${v}</text>`;
  });

  const y70 = yOf(70), y85 = yOf(85);
  const baseHtml = `
    <line x1="${plotLeft}" y1="${y70}" x2="${plotRight}" y2="${y70}" stroke="var(--sub)" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="${plotRight + 6}" y="${y70 + 3}" font-size="9" fill="var(--sub)">合格目安70%</text>
    <line x1="${plotLeft}" y1="${y85}" x2="${plotRight}" y2="${y85}" stroke="var(--sub)" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="${plotRight + 6}" y="${y85 + 3}" font-size="9" fill="var(--sub)">受験判断85%</text>`;

  let pathD = "";
  hist.forEach((d, i) => { pathD += (i === 0 ? "M" : "L") + xOf(i) + "," + yOf(d.score) + " "; });
  const lineHtml = `<path d="${pathD.trim()}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;

  const showEvery = n > 8 ? Math.ceil(n / 8) : 1;
  let xLabelsHtml = "";
  hist.forEach((d, i) => {
    if (i % showEvery !== 0 && i !== n - 1) return;
    xLabelsHtml += `<text x="${xOf(i)}" y="${plotBottom + 16}" text-anchor="middle" font-size="9" fill="var(--sub)">${fmtMD(d.t)}</text>`;
  });

  let markersHtml = "";
  hist.forEach((d, i) => {
    const x = xOf(i), y = yOf(d.score);
    markersHtml += `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)" stroke="var(--card)" stroke-width="2"/>`;
    markersHtml += `<circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer"
      onmouseenter="showMockTip(event, ${i})" onmouseleave="hideMockTip()" onclick="showMockTip(event, ${i})"/>`;
  });

  const lastIdx = n - 1;
  const lastLabelHtml = `<text x="${xOf(lastIdx)}" y="${yOf(hist[lastIdx].score) - 12}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text)">${hist[lastIdx].score}%</text>`;

  const svg = `<svg viewBox="0 0 640 220" style="width:100%;height:auto;display:block" role="img" aria-label="模擬試験スコア推移">
    ${gridHtml}${baseHtml}${lineHtml}${xLabelsHtml}${markersHtml}${lastLabelHtml}
  </svg>`;

  let badgeHtml = "";
  if (n >= 2 && hist[n - 1].score >= 85 && hist[n - 2].score >= 85) {
    badgeHtml = `<div class="mock-badge">🎉 受験予約レベル到達（2回連続85%以上）</div>`;
  }

  const recent = hist.slice().reverse().slice(0, 10);
  let rows = "";
  recent.forEach(d => {
    const dt = new Date(d.t);
    const dateStr = `${dt.getFullYear()}/${String(dt.getMonth() + 1).padStart(2, "0")}/${String(dt.getDate()).padStart(2, "0")}`;
    rows += `<tr><td>${dateStr}</td><td>${d.score}%</td><td>${esc(weakestDomain(d.perDomain))}</td></tr>`;
  });
  const table = `<table class="progress"><tr><th>日付</th><th>スコア</th><th>最弱分野</th></tr>${rows}</table>`;

  return `<div class="card" id="mock-chart-wrap" style="position:relative">
    <h2>模擬試験の推移</h2>
    ${badgeHtml}
    ${svg}
    <div id="mock-tooltip" class="mock-tooltip" style="display:none;position:absolute;"></div>
    ${table}
  </div>`;
}
function showMockTip(evt, idx) {
  const d = mockHistoryChartData[idx];
  const tip = document.getElementById("mock-tooltip");
  const wrap = document.getElementById("mock-chart-wrap");
  if (!d || !tip || !wrap) return;
  tip.innerHTML = `<div><strong>${fmtMD(d.t)}</strong></div><div>スコア: ${d.score}%</div><div>最弱分野: ${esc(weakestDomain(d.perDomain))}</div>`;
  tip.style.display = "block";
  const rect = wrap.getBoundingClientRect();
  let x = evt.clientX - rect.left + 12;
  let y = evt.clientY - rect.top - 10;
  x = Math.max(4, Math.min(x, rect.width - 210));
  tip.style.left = x + "px";
  tip.style.top = y + "px";
  evt.stopPropagation();
}
function hideMockTip() {
  const tip = document.getElementById("mock-tooltip");
  if (tip) tip.style.display = "none";
}

/* ===== ホーム画面（ダッシュボード） ===== */
function renderHome() {
  stopTimer();
  session = null;
  const p = loadProgress();
  const wrongCount = QUESTIONS.filter(q => p[q.id] && p[q.id].w).length;
  const dueCount = getDueReviewIds().length;

  let rows = "";
  for (const d of Object.keys(DOMAINS)) {
    const qs = QUESTIONS.filter(q => q.domain == d);
    let attempted = 0, correctSum = 0, attemptSum = 0;
    for (const q of qs) {
      const e = p[q.id];
      if (e && e.a > 0) { attempted++; correctSum += e.c; attemptSum += e.a; }
    }
    const cov = qs.length ? Math.round(attempted / qs.length * 100) : 0;
    const acc = attemptSum ? Math.round(correctSum / attemptSum * 100) : null;
    rows += `<tr>
      <td>${d}. ${esc(DOMAINS[d].name)}</td>
      <td>${DOMAINS[d].weight}%</td>
      <td>${attempted}/${qs.length}<div class="bar"><div style="width:${cov}%"></div></div></td>
      <td>${acc === null ? "—" : acc + "%"}</td>
    </tr>`;
  }

  $app.innerHTML = `
    <div class="card">
      <h2>進捗ダッシュボード</h2>
      <table class="progress">
        <tr><th>分野</th><th>配点</th><th>演習カバー率</th><th>正答率</th></tr>
        ${rows}
      </table>
      <div style="margin-top:12px">
        <button class="ghost" onclick="resetProgress()">進捗リセット</button>
      </div>
    </div>
    ${buildMockHistorySection()}
    ${buildMistakeSection()}
    <div class="card">
      <h2>学習の進め方</h2>
      <ol style="padding-left:1.4em; font-size:.9rem">
        <li>「学習ノート」タブで分野ごとのノートを読む</li>
        <li>「分野別練習」タブで全分野をひと通り演習する</li>
        <li>模擬試験 → 弱点復習 → 該当ノート再読のループを回す</li>
        <li>模擬試験で2回連続85%以上になったら受験を予約する</li>
      </ol>
    </div>`;
}

function resetProgress() {
  if (confirm("進捗（正答率・弱点データ・間隔反復の復習期限）と模擬試験のスコア履歴をすべてリセットしますか?")) {
    localStorage.removeItem(STORE_KEY);

}

/* ===== 分野別練習 ===== */
function renderDomainSelect() {
  stopTimer();
  session = null;
  let items = "";
  for (const d of Object.keys(DOMAINS)) {
    const n = QUESTIONS.filter(q => q.domain == d).length;
    items += `<label><input type="checkbox" value="${d}" checked>
      ${d}. ${esc(DOMAINS[d].name)} <span class="muted">(${n}問・配点${DOMAINS[d].weight}%)</span></label>`;
  }
  $app.innerHTML = `
    <div class="card">
      <h2>分野別練習 — 出題範囲を選択</h2>
      <div class="domain-select" id="dsel">${items}</div>
      <div style="margin-top:10px">
        <label style="display:flex;gap:8px;align-items:center;padding:8px 10px">
          <input type="checkbox" id="opt-shuffle" checked> 出題順をシャッフル
        </label>
      </div>
      <div class="nav-row">

function startPractice() {
  const checked = [...document.querySelectorAll("#dsel input:checked")].map(i => Number(i.value));
  if (checked.length === 0) { alert("分野を1つ以上選択してください"); return; }
  let qs = QUESTIONS.filter(q => checked.includes(q.domain));
  if (document.getElementById("opt-shuffle").checked) qs = shuffle(qs);
  beginSession("practice", qs);
}

function startReview() {
  const p = loadProgress();
  const qs = shuffle(QUESTIONS.filter(q => p[q.id] && p[q.id].w));
  if (qs.length === 0) { alert("復習対象の問題はありません"); return; }
  beginSession("review", qs);
}

function startSpacedReview() {
  const dueIds = getDueReviewIds();
  const qs = shuffle(QUESTIONS.filter(q => dueIds.includes(q.id)));
  if (qs.length === 0) { alert("今日の復習対象の問題はありません"); return; }
  beginSession("spaced", qs);
}

/* ===== 模擬試験 ===== */
const MOCK_TOTAL = 60, MOCK_LIMIT_SEC = 90 * 60;
function startMock() {
  const counts = {};
  let assigned = 0;
  const keys = Object.keys(DOMAINS);
  for (const d of keys) {
    counts[d] = Math.round(MOCK_TOTAL * DOMAINS[d].weight / 100);
    assigned += counts[d];
  }
  counts[5] += MOCK_TOTAL - assigned;
  let qs = [];
  for (const d of keys) {
    const pool = shuffle(QUESTIONS.filter(q => q.domain == d));
    qs = qs.concat(pool.slice(0, Math.min(counts[d], pool.length)));
  }
  qs = shuffle(qs);
  beginSession("mock", qs, MOCK_LIMIT_SEC);
}

/* ===== セッション共通 ===== */
function permuteQuestion(q) {
  const perm = shuffle(q.choices.map((_, i) => i));
  return {
    ...q,
    choices: perm.map(i => q.choices[i]),
    answer: q.answer.map(a => perm.indexOf(a)),
  };
}

function beginSession(mode, questions, limitSec) {
  questions = questions.map(permuteQuestion);
  session = {
    mode, questions, idx: 0,
    answers: new Array(questions.length).fill(null),
    limitSec: limitSec || null,
    remainSec: limitSec || null,
    timerId: null,
    checked: false,
    curSel: new Set(),
  };
  if (limitSec) {
    session.timerId = setInterval(() => {
      session.remainSec--;
      updateTimer();
      if (session.remainSec <= 0) { finishMock(); }
    }, 1000);
  }
  renderQuestion();
}

function updateTimer() {
  if (!session || session.remainSec === null) { $hdr.innerHTML = ""; return; }
  const m = Math.floor(session.remainSec / 60), s = session.remainSec % 60;
  const warn = session.remainSec < 600 ? " warn" : "";
  $hdr.innerHTML = `<span class="timer${warn}">残り ${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}</span>`;
}

function modeLabel() {
  return { practice: "分野別練習", mock: "模擬試験", review: "弱点復習", spaced: "今日の復習" }[session.mode];
}

function renderQuestion() {
  const q = session.questions[session.idx];
  const isMulti = q.answer.length > 1;
  const total = session.questions.length;
  updateTimer();

  let choicesHtml = "";
  q.choices.forEach((c, i) => {
    const sel = session.curSel.has(i) ? " selected" : "";
    choicesHtml += `<button class="choice${sel}" data-i="${i}" onclick="toggleChoice(${i})">${esc(c)}</button>`;
  });

  const isMock = session.mode === "mock";
  $app.innerHTML = `
    <div class="card">
      <div class="qmeta">
        <span><span class="pill">${modeLabel()}</span>問 ${session.idx + 1} / ${total}</span>
        <span>分野${q.domain}: ${esc(DOMAINS[q.domain].name)}</span>
      </div>
      ${isMulti ? '<div class="multi-note">※ 複数選択（該当するものをすべて選ぶ）</div>' : ""}
      <div class="qtext">${esc(q.q)}</div>
      <div id="choices">${choicesHtml}</div>
      <div id="feedback"></div>
      <div class="nav-row">
        <button onclick="quitSession()">中断してホームへ</button>
        <div style="display:flex;gap:8px">
          ${isMock && session.idx > 0 ? '<button onclick="mockPrev()">← 前へ</button>' : ""}
          <button class="primary" id="main-btn" onclick="mainAction()">${isMock ? (session.idx === total - 1 ? "採点する" : "次へ →") : "回答する"}</button>
        </div>
      </div>
    </div>`;

  if (isMock && session.answers[session.idx]) {
    session.curSel = new Set(session.answers[session.idx].sel);
    refreshChoices();
  }
  session.checked = false;
}

function toggleChoice(i) {
  if (session.checked) return;
  const q = session.questions[session.idx];
  const isMulti = q.answer.length > 1;
  if (isMulti) {
    session.curSel.has(i) ? session.curSel.delete(i) : session.curSel.add(i);
  } else {
    session.curSel = new Set([i]);
  }
  refreshChoices();
}

function refreshChoices() {
  document.querySelectorAll("#choices .choice").forEach(btn => {
    const i = Number(btn.dataset.i);
    btn.classList.toggle("selected", session.curSel.has(i));
  });
}

function mainAction() {
  const isMock = session.mode === "mock";
  if (isMock) {
    saveCurrentMockAnswer();
    if (session.idx === session.questions.length - 1) { finishMock(); }
    else { session.idx++; session.curSel = new Set(); renderQuestion(); }
    return;
  }
  if (!session.checked) { checkAnswer(); }
  else { nextPractice(); }
}

function checkAnswer() {
  if (session.curSel.size === 0) { alert("選択肢を選んでください"); return; }
  const q = session.questions[session.idx];
  const sel = [...session.curSel];
  const correct = sameSet(sel, q.answer);
  recordAnswer(q.id, correct);
  session.answers[session.idx] = { sel, correct };
  session.checked = true;

  document.querySelectorAll("#choices .choice").forEach(btn => {
    const i = Number(btn.dataset.i);
    if (q.answer.includes(i)) btn.classList.add("correct");
    else if (session.curSel.has(i)) btn.classList.add("wrong");
  });

  document.getElementById("feedback").innerHTML = `
    <div class="expl ${correct ? "" : "ng"}">
      <div class="verdict ${correct ? "ok" : "ng"}">${correct ? "✔ 正解" : "✘ 不正解"}</div>
      ${esc(q.expl)}
    </div>`;
  const btn = document.getElementById("main-btn");
  btn.textContent = session.idx === session.questions.length - 1 ? "結果を見る" : "次の問題 →";
}

function nextPractice() {
  if (session.idx === session.questions.length - 1) { finishPractice(); return; }
  session.idx++;
  session.curSel = new Set();
  renderQuestion();
}

function finishPractice() {
  stopTimer();
  const answered = session.answers.filter(Boolean);
  const correct = answered.filter(a => a.correct).length;
  const pct = answered.length ? Math.round(correct / answered.length * 100) : 0;
  $app.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>${modeLabel()} 終了</h2>
      <div class="score-big ${pct >= 70 ? "pass" : "fail"}">${pct}%</div>
      <p class="muted">${answered.length}問中 ${correct}問正解</p>
      <div class="nav-row" style="justify-content:center">
        <button class="primary" onclick="switchTab('home')">ホームへ</button>
      </div>
    </div>`;
  session = null;
}

function saveCurrentMockAnswer() {
  const q = session.questions[session.idx];
  const sel = [...session.curSel];
  session.answers[session.idx] = { sel, correct: sameSet(sel, q.answer) };
}
function mockPrev() {
  saveCurrentMockAnswer();
  session.idx--;
  session.curSel = new Set(session.answers[session.idx] ? session.answers[session.idx].sel : []);
  renderQuestion();
}

function finishMock() {
  stopTimer();
  if (session.answers[session.idx] === null && session.curSel.size > 0) saveCurrentMockAnswer();

  let correct = 0;
  const perDomain = {};
  session.questions.forEach((q, i) => {
    const a = session.answers[i];
    const ok = a ? a.correct : false;
    recordAnswer(q.id, ok);
    if (ok) correct++;
    perDomain[q.domain] = perDomain[q.domain] || { t: 0, c: 0 };
    perDomain[q.domain].t++;
    if (ok) perDomain[q.domain].c++;
  });
  const total = session.questions.length;
  const pct = Math.round(correct / total * 100);

  const mh = loadMockHistory();
  mh.push({ t: Date.now(), score: pct, correct, total, perDomain });
  saveMockHistory(mh);

  let rows = "";
  for (const d of Object.keys(DOMAINS)) {
    if (!perDomain[d]) continue;
    const e = perDomain[d];
    const dp = Math.round(e.c / e.t * 100);
    rows += `<tr><td>${d}. ${esc(DOMAINS[d].name)}</td><td>${e.c}/${e.t}</td>
      <td><div class="bar"><div style="width:${dp}%"></div></div></td><td>${dp}%</td></tr>`;
  }

  let wrongHtml = "";
  session.questions.forEach((q, i) => {
    const a = session.answers[i];
    if (a && a.correct) return;
    wrongHtml += `<div class="browse-item">
      <div><span class="pill">分野${q.domain}</span>${esc(q.q)}</div>
      <div class="ans">正解: ${q.answer.map(x => esc(q.choices[x])).join(" / ")}</div>
      <div class="ex">${esc(q.expl)}</div>
    </div>`;
  });

  $app.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>模擬試験 結果</h2>
      <div class="score-big ${pct >= 70 ? "pass" : "fail"}">${pct}%</div>
      <p class="muted">${total}問中 ${correct}問正解 — ${pct >= 85 ? "受験レベル到達。この調子で仕上げる" : pct >= 70 ? "合格ライン相当。85%を目指して弱点を潰す" : "まだ演習不足。弱点復習+ノート再読へ"}</p>
    </div>
    <div class="card">
      <h3>分野別スコア</h3>
      <table class="progress"><tr><th>分野</th><th>正解</th><th></th><th>正答率</th></tr>${rows}</table>
    </div>
    ${wrongHtml ? `<div class="card"><h3>間違えた問題の解説</h3>${wrongHtml}</div>` : ""}
    <div class="nav-row" style="justify-content:center">
      <button class="primary" onclick="switchTab('home')">ホームへ</button>
    </div>`;
  session = null;
}

function quitSession() {
  if (confirm("セッションを中断してホームに戻りますか?（模擬試験の場合、回答は破棄されます）")) {
    stopTimer();
    session = null;
    switchTab('home');
  }
}

/* ===== 全問ブラウズ ===== */
function renderBrowse() {
  stopTimer();
  session = null;
  let html = "";
  for (const d of Object.keys(DOMAINS)) {
    const qs = QUESTIONS.filter(q => q.domain == d);
    let items = "";
    qs.forEach((q, i) => {
      items += `<div class="browse-item">
        <div><strong>Q${i + 1}.</strong> ${esc(q.q)}</div>
        <div class="ans">正解: ${q.answer.map(x => esc(q.choices[x])).join(" / ")}</div>
        <div class="ex">${esc(q.expl)}</div>
      </div>`;
    });
    html += `<div class="card"><h3>分野${d}: ${esc(DOMAINS[d].name)}（${qs.length}問・配点${DOMAINS[d].weight}%）</h3>${items}</div>`;
  }
  $app.innerHTML = html;
}

document.addEventListener("click", hideMockTip);

// Init
renderStudy(1);
</script>
