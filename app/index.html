/* ===== NOTES DATA ===== */
const NOTES = {
  1: `# 分野1: Platform Overview and Navigation（配点 7%）

## 1. Now Platform の基本

- ServiceNow は **PaaS（Platform as a Service）** 型のクラウドプラットフォーム。単一のデータモデル上に ITSM / ITOM / HR / CSM などのアプリケーションが載る。
- 各顧客は専用の**インスタンス**（例: \`company.service-now.com\`）を持つ。**シングルテナント型**（インスタンスごとに独立したDB）。
- **リリース**: 年2回のメジャーリリース。都市名のアルファベット順で命名（例: Xanadu → Yokohama → Zurich）。
- **Now Support（旧HI）**: ServiceNowへのサポート依頼・インスタンス管理を行うポータル。

## 2. Next Experience UI（統合ナビゲーション）

現行のデフォルトUI。画面上部のヘッダーに主要メニューが集約されている。

| 要素 | 役割 |
|------|------|
| **All（すべて）** | 全アプリケーション・モジュールのメニュー（旧アプリケーションナビゲーター）。フィルター入力で絞り込み |
| **Favorites（お気に入り）** | ★を付けたモジュールへのショートカット。名前・アイコン編集可 |
| **History（履歴）** | 直近に開いたレコード・リスト・フォーム |
| **Workspaces** | ロールに応じたワークスペース（Agent Workspace等）一覧 |
| **Admin** | 管理者向けクイックアクセス（adminロール保持者のみ） |
| **グローバル検索** | ヘッダーの虫眼鏡。検索グループ・検索ソースで対象を制御 |
| **ユーザーメニュー** | 右上アバター。プロファイル・設定・impersonate・ログアウト |
| **Contextual App Pill** | 現在のアプリケーションスコープ・更新セットの表示/切替（開発者向け設定） |

- **モジュール**: メニューの1項目。リスト表示・フォーム表示・URL・スクリプト実行などのリンクタイプを持つ。
- **アプリケーションメニュー**: モジュールをまとめる親項目。ロールで表示制御できる。

## 3. Impersonation（ユーザー代理）

- adminは他ユーザーに**なりすまし（impersonate）**て、そのユーザーの見え方・権限を確認できる（\`impersonator\` ロールでも可）。
- impersonate中の操作は**そのユーザーの操作として記録**されるが、システムログにはimpersonateの事実も記録される。
- テスト目的でのアクセス権確認（ACL・UIポリシーの見え方）に必須のテクニック。

## 4. リストとフォーム（基本操作）

- **リスト**: テーブル内レコードの一覧。列ソート・フィルター・グループ化・インライン編集が可能。
  - **リストコントロールメニュー**（左上ハンバーガー）から列の設定・エクスポート等。
  - **ブレッドクラム**: 現在のフィルター条件を表示。クリックで条件を段階的に解除。条件は**左から右にAND**で絞り込まれる。
- **フォーム**: 1レコードの表示・編集画面。関連リスト（Related Lists）で子レコードを表示。
- **右クリックメニュー**（フォームヘッダー）: Configure > Form Layout / Form Design、Export、履歴表示など管理操作の入口。

## 5. 検索

- **グローバル検索**: 複数テーブル横断。ワイルドカード（\`*text\`）や完全一致（\`"text"\`）が使える。
- **リスト検索**: 列ヘッダー上の検索行。\`*\`前方付与で部分一致。
- **Zing**: ServiceNowの検索エンジン（グローバル検索・ナレッジ検索等を支える）。

## 6. 設定（Preferences）

- ユーザーメニュー > Preferences でテーマ・表示密度・言語・タイムゾーン等を個人単位で設定。
- 管理者はシステムプロパティでインスタンス全体のデフォルトを設定（分野2参照）。

---

## 頻出ポイント

- All / Favorites / History の役割の区別
- モジュールとアプリケーションメニューの関係、ロールによる表示制御
- impersonate で何が確認できるか・誰ができるか
- ブレッドクラムの読み方（AND条件・クリックによる解除）
- リリースが年2回・都市名順であること

  ├── シングルテナント（顧客ごとに独立したDB）

         ┌─────────────────────────────────┐

         └───────────────┬─────────────────┘
                         │
          ┌──────────────┼──────────────┐

        [All]       [Favorites]    [History]

  ┌───────────────────────┐
  │ アプリケーションメニュー │  ← ロールで表示制御
  └──────────┬────────────┘
             │
             ↓ クリック
  ┌───────────────────────┐
  │       モジュール        │  ← リンクタイプ: リスト/フォーム/URL
  └──────────┬────────────┘
             │
       ┌─────┴─────┐
       ↓           ↓
   【リスト】     【フォーム】
   (テーブル全体)  (1レコード)
       │               │
   ブレッドクラム   関連リスト

## PDI 操作ガイド

### タスク1: All メニューの構造を確認する

1. \`All\` をクリックし、左サイドパネルを開く。
2. フィルター入力欄に \`user\` と入力し、メニューが絞り込まれることを確認する。
3. \`User Administration\` の下に \`Users\`・\`Groups\`・\`Roles\` などのモジュールを確認する。
4. \`Users\` をクリックし、\`sys_user\` テーブルのリスト画面が開くことを確認する。

### タスク2: ブレッドクラムを操作する

1. \`All → Incident → All\` を開く。
2. 列ヘッダーを右クリック → \`Filter By\` を選択しフィルターを追加する。
3. 上部ブレッドクラムに条件が表示されることを確認する。
4. さらに別列でフィルターを追加し、AND で条件が積まれることを確認する。
5. 左の条件をクリックし、それより右の条件が解除されることを確認する。

### タスク3: Impersonation を実行する

1. ユーザーメニュー → \`Impersonate User\` をクリックする。
2. \`Abel Tuter\` を選択してセッションを切り替える。
3. \`All\` メニューの項目が減っていること、\`Admin\` メニューが消えていることを確認する。
4. \`End Impersonation\` で元の admin セッションに戻る。

  2: `# 分野2: Instance Configuration（配点 11%）

## 1. システムプロパティ（System Properties）

- インスタンス全体の動作を制御する設定値。テーブルは \`sys_properties\`。
- 例: \`glide.ui.session_timeout\`（セッションタイムアウト）、メール送受信の有効化など。
- 変更はインスタンス全体に影響するため、変更前に影響範囲を確認する。

## 2. ブランディング / テーマ

- **Next Experience**では、テーマ（ロゴ・配色）を **Next Experience の Theme（ブランディング設定）** で構成する。
- 会社ロゴ・ブラウザタブのタイトル・バナー画像などを設定可能。
- ポータル（Service Portal / Employee Center）のブランディングは別途ポータル側で設定する。

## 3. フォーム設定

| 手段 | 用途 |
|------|------|
| **Form Layout** | フィールドの追加・削除・並び替え（シンプルなスレート型UI） |
| **Form Design** | ドラッグ&ドロップのWYSIWYG。セクション・列構成も編集可 |
| **ビュー（View）** | 同じテーブルに複数のフォーム/リストレイアウトを持たせる仕組み |

- ビューはリストにも適用される。**ビュールール（View Rules）**で条件に応じたビュー自動切替が可能。

## 4. リスト設定

- **List Layout** で列の追加・削除・順序変更（管理者は全員向けデフォルトを変更、一般ユーザーは個人設定）。
- 個人の列設定（Personal List）はデフォルトより優先される。

## 5. プラグイン（Plugins）

- 機能単位の拡張モジュール。**有効化はできるが、基本的に無効化（アンインストール）はできない**。
- 一部プラグインは有償・要ライセンス。
- 有効化するとデモデータを含められる場合がある（本番では通常含めない）。

## 6. Update Set（更新セット）— CSA頻出

構成変更（カスタマイズ）をインスタンス間で移送するための仕組み。

- **記録されるもの**: 構成レコード（フォームレイアウト、ビジネスルール、ACL等）。
- **記録されないもの**: **データ（タスクレコード等）・スケジュールジョブの実行結果・ホームページ/ダッシュボード**。
- 流れ: 開発環境で Update Set 作成 → **Complete** に変更 → テスト環境で **Retrieve（取得）** → **Preview（プレビュー）** で衝突検出 → **Commit（コミット）**。
- **Default update set**: 更新セットを指定しないときの受け皿。移送用には使わない。
- プレビューで衝突（Collision）が出たら、Accept/Skip を判断してからコミット。

## 7. 開発プロセス

- 典型構成: **開発（Dev） → テスト（Test） → 本番（Prod）** の3インスタンス。
- カスタマイズは Dev で行い、Update Set で昇格。本番で直接変更しない。
- **クローン（Clone）**: 本番インスタンスのデータ・構成を下位環境へコピーする機能（逆方向はしない）。

---

## 頻出ポイント

- Update Set に**含まれるもの/含まれないもの**（データは含まれない）
- Update Set の移送フロー（Complete → Retrieve → Preview → Commit）
- Form Layout と Form Design の違い、ビューの概念
- プラグインは基本的に無効化できない
- クローンは本番→下位環境の方向

---

## 全体構造マップ

\`\`\`
【フォーム・リスト表示の制御】
  テーブル定義 (sys_dictionary)
      │
      ├── Form Layout  → フィールドの追加/並び替えのみ
      ├── Form Design  → セクション・列構成もドラッグ編集
      └── ビュー(View) → ビュールールで自動切替
              ├── 標準ビュー
              ├── モバイルビュー
              └── ロール別ビュー

【環境間の変更管理】
  開発(Dev)
    └─ Update Set 作成 → Complete
          ↓
    テスト(Test) → Retrieve → Preview → Commit
          ↓
    本番(Prod)  → Retrieve → Preview → Commit

  ※ 記録対象: 構成レコード（カスタマイズ）のみ
  ※ 非記録: データレコード・ダッシュボード・実行結果

【環境コピー】
  本番(Prod) ──Clone──→ テスト(Test) / 開発(Dev)
  ※ 逆方向（下位→本番）のクローンは行わない
\`\`\`
`,

  3: `# 分野3: Configuring Applications for Collaboration（配点 20%）

## 1. ユーザー・グループ・ロール

ユーザー（sys_user）、グループ（sys_user_group）、ロール（sys_user_role）の3層構造。ロールはグループに付与してユーザーはグループに所属させるのがベストプラクティス。\`security_admin\` は elevate role で一時昇格して使う。

## 2. タスクテーブル（Task Table）

\`task\` テーブルが親で、Incident / Problem / Change / Request などが拡張（継承）する。共通フィールドを継承。

## 3. Visual Task Board（VTB）

| 種類 | 特徴 |
|------|------|
| **Flexible** | レーンを手動で自由に作成、タスクを自由配置 |
| **Guided** | フィールド値（例: State）にレーンが連動、移動で値が変わる |
| **Freeform** | ボードに直接カード（レコード外）を自由追加可能 |

## 4. 通知（Notifications）

3要素: **When to send / Who will receive / What it will contain**。イベント駆動（\`gs.eventQueue()\`）も可。

## 5. レポートとダッシュボード

- **レポート**: 「今」のデータをスナップショット表示。
- **Performance Analytics（PA）**: 「経時変化」のトレンド分析。スコアを定期収集してScorecardで可視化。

## 6. ナレッジ管理（Knowledge Management）

KB > Category > Article の階層。**Draft → Review → Published → Retired** のライフサイクル。**User Criteria** で Can Read / Can Contribute を制御。

## 7. Connect / チャット

- **Work notes（作業メモ）**: 内部向け。顧客には表示されない。
- **Additional comments（コメント）**: 顧客向け。メールで通知される。

---

## 頻出ポイント

- ロールをグループ経由で付与するのがベストプラクティス
- 通知の3要素（When / Who / What）
- VTBの3種類の違い（特にGuidedはフィールド値と連動）
- PA vs レポートの使い分け（トレンド vs スナップショット）
- User Criteria でナレッジのアクセスを制御

---

## 全体構造マップ

\`\`\`
【ユーザー管理の3層構造】

  sys_user (ユーザー)
    └─ 所属 ──→ sys_user_group (グループ)
                    └─ 付与 ──→ sys_user_role (ロール)
                                    └─ 制御 ──→ ACL / Application Access

  ※ security_admin: Elevate Role → 一時昇格 → セッション終了で失効

【タスク継承ツリー】

  task (親テーブル)
    ├── incident
    ├── problem
    ├── change_request
    └── sc_request
              └── sc_req_item

【通知フロー】

  トリガー条件 (レコード変更 / イベント)
    └─→ Notification
              ├── When to send  (条件フィルター / イベント名)
              ├── Who receives  (ユーザー / グループ / フィールド値)
              └── What contains (件名 / 本文テンプレート)

【ナレッジ管理】

  Knowledge Base
    └── Category
              └── Article
                      Draft → Review → Published → Retired

  User Criteria → Can Read / Can Contribute を制御
\`\`\`
`,

  4: `# 分野4: Self-Service & Automation（配点 20%）

## 1. サービスカタログ（Service Catalog）

**Catalog > Category > Catalog Item** の階層。注文すると **REQ（sc_request） > RITM（sc_req_item） > SCTASK（sc_task）** の親子構造が作られる。

- **Record Producer**: 任意テーブルへのレコード直接作成（REQ/RITMは生成されない）。
- **Order Guide**: 複数アイテム一括注文。
- **Variable Set**: 変数を複数アイテムで再利用。

## 2. Service Portal / Employee Center

ウィジェットベースのセルフサービスポータル。Employee Center が新標準。

## 3. Flow Designer

**トリガー（Record/Schedule/Application） + Action** の並び。

- **Subflow**: トリガーなしの再利用部品。Flowから呼び出す。
- **Spoke**: アプリ/外部サービス単位のコネクタ。
- **Data Pill**: 前ステップの値を後続に渡す仕組み。

## 4. 承認（Approvals）

**Ask for Approval** アクションで承認依頼。\`sysapproval_approver\` テーブルに記録。

## 5. SLA

SLA Definition で開始/停止/一時停止条件と目標時間を定義。**Task SLA（task_sla）** レコードとして各タスクに付く。**Retroactive Start** で過去時点から計時開始。

## 6. Assignment（自動割当）

**Assignment Rules** で条件一致時に Assignment group / Assigned to を自動設定。

---

## 頻出ポイント

- Record Producer は REQ/RITM を生成しない（任意テーブルへ直接）
- REQ > RITM > SCTASK の親子構造
- SubflowはFlowと異なりトリガーを持たない再利用部品
- SLAの開始/停止/一時停止条件は独立して設定
- Variable Set で変数を複数アイテムに再利用

---

## 全体構造マップ

\`\`\`
【カタログ注文フロー】

        ↓
  REQ (sc_request)          ← 1注文=1REQ
    └─ RITM (sc_req_item)   ← 1アイテム=1RITM

  Record Producer → 対象テーブルへ直接 (REQ/RITMなし)

    └── Retroactive Start → 過去時点から計時

  → Task SLA (task_sla) として各レコードに1対多で付く

  5: `# 分野5: Database Management（配点 27%・最重要）

## 1. データスキーマの基本

- 全テーブル定義は \`sys_db_object\`。フィールド定義（辞書）は \`sys_dictionary\`。ラベルは \`sys_documentation\`。
- \`sys_id\` は32文字GUIDで全レコードに存在。

## 2. テーブルの拡張（継承）

- \`task\` が Incident / Problem / Change 等の親。
- \`cmdb_ci\` が CI系の親。
- \`sys_user\` は単独テーブル（拡張ではない）。
- 親のリストには子のレコードも表示される。
- 新規カスタムテーブルには **\`u_\` プレフィックス**が自動付与。

## 3. フィールドタイプと参照

- **Reference**（1対多）: 参照先テーブルの1レコードを指す。
- **List**（複数参照）: 複数レコードを参照。
- **Choice**: \`sys_choice\` テーブルで管理。
- **Dot-walking**: 参照先フィールドにアクセス（例: \`caller_id.company.name\`）。

## 4. リレーションシップ

- 1対多 = Reference フィールド
- 多対多 = m2m テーブル（例: \`sys_user_has_role\`）
- Database View = JOIN（読み取り専用の仮想テーブル）

## 5. CMDB

- CI基底テーブルは \`cmdb_ci\`。
- CIリレーションシップは \`cmdb_rel_ci\` テーブル。

## 6. ACL（アクセス制御）— 最頻出

評価順序:
1. **テーブルレベル**（具体テーブル名 → 親テーブル名 → ワイルドカード \`*\`）
2. **フィールドレベル**（具体フィールド名 → ワイルドカード \`*\`）

両方パスしてアクセス可能。**ACL変更には \`security_admin\` への elevate role が必要**。

条件の3種類: **ロール / 条件（フィルター） / スクリプト**（この順で評価、すべてtrueで通過）。

## 7. UI Policy / Data Policy / Business Rule

| 機能 | 適用範囲 | 用途 |
|------|----------|------|
| **UI Policy** | フォームのみ | フィールドの表示/非表示・必須・読み取り専用 |
| **Data Policy** | 全入力経路（インポート・API含む） | 必須・読み取り専用の強制 |
| **Business Rule** | サーバーサイド | insert/update/delete/query のロジック |

## 8. 監査・辞書オーバーライド

- **Auditing**: \`sys_audit\` に変更履歴を記録（テーブルごとに有効化必要）。
- **辞書オーバーライド**: 子テーブルだけ属性変更（親の定義は変えない）。

---

## 頻出ポイント

- ACL評価順序（テーブル→フィールド、具体→ワイルドカード）
- UI Policy vs Data Policy の適用範囲の違い
- Dot-walking の概念と書き方
- sys_user は task を拡張していない（独立テーブル）
- 辞書オーバーライドで子だけ属性変更

---

## 全体構造マップ

\`\`\`
【スキーマ層】
  sys_db_object (テーブル定義)
    ├──→ sys_dictionary (フィールド定義)
    │         └──→ sys_documentation (ラベル)
    └──→ sys_choice (Choice選択肢)

【テーブル継承ツリー】
  task (親)
    ├── incident
    ├── problem
    └── change_request

  cmdb_ci (親)
    ├── cmdb_ci_computer
    └── cmdb_ci_server

  sys_user ── (継承なし・独立テーブル)

【ACL 評価フロー】
  リクエスト
      ↓
  テーブルACL評価
    具体テーブル名 → 親テーブル名 → *(ワイルドカード)
      ↓ 通過
  フィールドACL評価
    具体フィールド名 → *(ワイルドカード)
      ↓ 通過       ↓ 失敗
  アクセス許可  アクセス拒否

  ACL条件評価順序:
    ロールチェック → 条件(フィルター) → スクリプト
    ※すべてtrueの場合のみ通過

【変更管理ポリシー層】
  フォーム操作  → UI Policy + Data Policy 両方適用
  インポート   → Data Policy のみ適用
  API/REST    → Data Policy のみ適用

  Business Rule (サーバーサイド)
    Before / After / Async × insert/update/delete/query
\`\`\`
`,

  6: `# 分野6: Data Migration and Integration（配点 15%）

## 1. Import Set — 中心テーマ

**Data Source → Import Set Table（ステージング） → Transform Map（変換）** の3ステップ。

**Coalesce** がキー:
- 一致あり → **Update**（既存レコード更新）
- 一致なし → **Insert**（新規挿入）
- 未指定   → **常に Insert**

結果ステータス: **Inserted / Updated / Ignored / Skipped / Error**

## 2. スケジュールインポート

**Scheduled Import** で定期実行。LDAP統合ではユーザー・グループを定期同期。

## 3. Web Services / API

- **Table API** などREST APIを標準提供。
- **REST API Explorer** でインスタンス内テスト可能。
- **IntegrationHub** はFlow Designerから外部連携するSpoke群（有償）。

## 4. エクスポート

CSV / Excel / PDF / XML / JSON でエクスポート可能。**Export to XML** は sys_id を維持したまま移送できる。

## 5. Update Set vs Import Set

| | Update Set | Import Set |
|--|-----------|-----------|
| 用途 | 構成・カスタマイズのインスタンス間移送 | 外部データの取り込み |
| 対象 | 構成レコード（スクリプト・フォーム等） | データレコード（ユーザー・CIなど） |

---

## 頻出ポイント

- Coalesce 未指定では常に Insert（重複に注意）
- Import Set の3ステップ（Data Source → Staging → Transform）
- REST API Explorer はインスタンス内テストツール
- Update Set はデータを含まない（構成のみ）
- LDAP 同期には Scheduled Import が必要

---

## 全体構造マップ

\`\`\`
【Import Set フロー】

  外部ソース (CSV / Excel / JDBC / REST)
        ↓
  Data Source (sys_data_source)
        ↓
  Import Set Table [ステージング]
  (u_imp_xxxx)
        ↓

  ターゲットテーブル (sys_user / cmdb_ci など)

    Inserted / Updated / Ignored / Skipped / Error

【API 連携】

    └── IntegrationHub Spoke (有償)

【LDAP 同期】

  LDAP サーバー
    └── LDAP Server 定義

/* ===== MARKDOWN RENDERER ===== */
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function inlineFormat(s) {
    s = escHtml(s);
    // code
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    // bold
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    // italic
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return s;
  }

  while (i < lines.length) {
    const line = lines[i];

    // fenced code block
    if (line.startsWith('```')) {
      let code = '';
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        code += escHtml(lines[i]) + '\n';
        i++;
      }
      html += `<pre><code>${code}</code></pre>`;
      i++;
      continue;
    }

    // heading
    if (/^#{1,3} /.test(line)) {
      const m = line.match(/^(#{1,3}) (.*)/);
      const level = m[1].length;
      const text = inlineFormat(m[2]);
      html += `<h${level}>${text}</h${level}>`;
      i++;
      continue;
    }

    // horizontal rule
    if (/^---+$/.test(line.trim())) {
      html += '<hr>';
      i++;
      continue;
    }

    // table
    if (line.startsWith('|') && i + 1 < lines.length && lines[i+1].match(/^\|[\s\-|]+\|$/)) {
      const headers = line.split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(h => `<th>${inlineFormat(h.trim())}</th>`).join('');
      i += 2; // skip separator
      let rows = '';
      while (i < lines.length && lines[i].startsWith('|')) {
        const cells = lines[i].split('|').filter((_, idx, arr) => idx > 0 && idx < arr.length - 1).map(c => `<td>${inlineFormat(c.trim())}</td>`).join('');
        rows += `<tr>${cells}</tr>`;
        i++;
      }
      html += `<div class="table-wrap"><table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table></div>`;
      continue;
    }

    // unordered list
    if (/^(\s*)- /.test(line)) {
      const baseIndent = line.match(/^(\s*)/)[1].length;
      let items = '';
      while (i < lines.length && /^(\s*)- /.test(lines[i])) {
        const text = lines[i].replace(/^\s*- /, '');
        items += `<li>${inlineFormat(text)}</li>`;
        i++;
      }
      html += `<ul>${items}</ul>`;
      continue;
    }

    // ordered list
    if (/^\d+\. /.test(line)) {
      let items = '';
      while (i < lines.length && /^\d+\. /.test(lines[i])) {
        const text = lines[i].replace(/^\d+\. /, '');
        items += `<li>${inlineFormat(text)}</li>`;
        i++;
      }
      html += `<ol>${items}</ol>`;
      continue;
    }

    // blank line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // paragraph
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].startsWith('#') && !lines[i].startsWith('|') && !lines[i].startsWith('```') && !lines[i].startsWith('- ') && !/^\d+\. /.test(lines[i]) && !/^---+$/.test(lines[i].trim())) {
      para += (para ? ' ' : '') + lines[i];
      i++;
    }
    if (para) html += `<p>${inlineFormat(para)}</p>`;
  }

  return html;
}

/* ===== 進捗ストア ===== */
const STORE_KEY = "csa_progress_v1";
const SPACED_INTERVALS = [3, 7, 14, 30, 60];
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; }
}
function saveProgress(p) { localStorage.setItem(STORE_KEY, JSON.stringify(p)); }
function recordAnswer(qid, correct) {
  const p = loadProgress();
  const e = p[qid] || { a: 0, c: 0, w: false, stg: 0, due: 0 };
  e.a++; if (correct) e.c++;
  e.w = !correct;
  if (correct) {
    e.stg = (e.stg || 0) + 1;
    const days = SPACED_INTERVALS[Math.min(e.stg - 1, SPACED_INTERVALS.length - 1)];
    e.due = Date.now() + days * 86400000;
  } else {
    e.stg = 0;
    e.due = Date.now() + 1 * 86400000;
  }
  p[qid] = e;
  saveProgress(p);
}
function getDueReviewIds() {
  const p = loadProgress();
  const now = Date.now();
  const ids = [];
  for (const qid in p) {
    const e = p[qid];
    if (!e || !(e.a > 0)) continue;
    if (e.due === undefined || e.due === null || e.due <= now) ids.push(Number(qid));
  }
  return ids;
}

const $app = document.getElementById("app");

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const s = new Set(b);
  return a.every(x => s.has(x));
}

/* ===== よく間違える問題 TOP10 ===== */
function truncate60(s) {
  const str = String(s);
  return str.length > 60 ? str.slice(0, 60) + "…" : str;
}
function getTopMistakes() {
  const p = loadProgress();
  const list = [];
  for (const qid in p) {
    const e = p[qid];
    const a = e.a || 0, c = e.c || 0;
    const wrong = a - c;
    if (wrong >= 1) list.push({ qid, a, c, wrong, rate: a ? wrong / a : 0 });
  }
  list.sort((x, y) => (y.wrong - x.wrong) || (y.rate - x.rate));
  return list.slice(0, 10);
}
function buildMistakeSection() {
  const top = getTopMistakes();
  if (top.length === 0) return "";
  let items = "";
  for (const m of top) {
    const q = QUESTIONS.find(qq => qq.id === Number(m.qid));
    if (!q) continue;
    items += `<div class="mistake-item" id="mistake-item-${q.id}">
      <div class="mistake-row" onclick="toggleMistake(${q.id})">
        <span class="pill">分野${q.domain}</span>
        <span class="mistake-text">${esc(truncate60(q.q))}</span>
        <span class="mistake-stats">誤答 ${m.wrong}回 / 挑戦 ${m.a}回</span>
      </div>
      <div class="mistake-detail">
        <div class="ans">正解: ${q.answer.map(x => esc(q.choices[x])).join(" / ")}</div>
        <div class="ex">${esc(q.expl)}</div>
      </div>
    </div>`;
  }
  return `<div class="card">
    <h2>よく間違える問題 TOP10</h2>
    ${items}
  </div>`;
}

/* ===== 模擬試験スコアの推移グラフ ===== */
function fmtMD(ts) {
  const d = new Date(ts);
  return `${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")}`;
}
function weakestDomain(perDomain) {
  let worstKey = null, worstRate = Infinity;
  for (const d in perDomain || {}) {
    const e = perDomain[d];
    const rate = e.t ? e.c / e.t : 1;
    if (rate < worstRate) { worstRate = rate; worstKey = d; }
  }
  if (worstKey === null) return "—";
  const name = DOMAINS[worstKey] ? DOMAINS[worstKey].name : "";
  return `分野${worstKey}: ${name}`;
}
function buildMockHistorySection() {
  const hist = loadMockHistory();
  mockHistoryChartData = hist;
  if (hist.length === 0) return "";

  const n = hist.length;
  const plotLeft = 40, plotRight = 520, plotTop = 16, plotBottom = 164;
  const xOf = i => n > 1 ? plotLeft + i * (plotRight - plotLeft) / (n - 1) : (plotLeft + plotRight) / 2;
  const yOf = score => plotBottom - (Math.max(0, Math.min(100, score)) / 100) * (plotBottom - plotTop);

  let gridHtml = "";
  [0, 25, 50, 75, 100].forEach(v => {
    const y = yOf(v);
    gridHtml += `<line x1="${plotLeft}" y1="${y}" x2="${plotRight}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    gridHtml += `<text x="${plotLeft - 8}" y="${y + 3}" text-anchor="end" font-size="9" fill="var(--sub)">${v}</text>`;
  });

  const y70 = yOf(70), y85 = yOf(85);
  const baseHtml = `
    <line x1="${plotLeft}" y1="${y70}" x2="${plotRight}" y2="${y70}" stroke="var(--sub)" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="${plotRight + 6}" y="${y70 + 3}" font-size="9" fill="var(--sub)">合格目安70%</text>
    <line x1="${plotLeft}" y1="${y85}" x2="${plotRight}" y2="${y85}" stroke="var(--sub)" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="${plotRight + 6}" y="${y85 + 3}" font-size="9" fill="var(--sub)">受験判断85%</text>`;

  let pathD = "";
  hist.forEach((d, i) => { pathD += (i === 0 ? "M" : "L") + xOf(i) + "," + yOf(d.score) + " "; });
  const lineHtml = `<path d="${pathD.trim()}" fill="none" stroke="var(--accent)" stroke-width="2"/>`;

  const showEvery = n > 8 ? Math.ceil(n / 8) : 1;
  let xLabelsHtml = "";
  hist.forEach((d, i) => {
    if (i % showEvery !== 0 && i !== n - 1) return;
    xLabelsHtml += `<text x="${xOf(i)}" y="${plotBottom + 16}" text-anchor="middle" font-size="9" fill="var(--sub)">${fmtMD(d.t)}</text>`;
  });

  let markersHtml = "";
  hist.forEach((d, i) => {
    const x = xOf(i), y = yOf(d.score);
    markersHtml += `<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)" stroke="var(--card)" stroke-width="2"/>`;
    markersHtml += `<circle cx="${x}" cy="${y}" r="14" fill="transparent" style="cursor:pointer"
      onmouseenter="showMockTip(event, ${i})" onmouseleave="hideMockTip()" onclick="showMockTip(event, ${i})"/>`;
  });

  const lastIdx = n - 1;
  const lastLabelHtml = `<text x="${xOf(lastIdx)}" y="${yOf(hist[lastIdx].score) - 12}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--text)">${hist[lastIdx].score}%</text>`;

  const svg = `<svg viewBox="0 0 640 220" style="width:100%;height:auto;display:block" role="img" aria-label="模擬試験スコア推移">
    ${gridHtml}${baseHtml}${lineHtml}${xLabelsHtml}${markersHtml}${lastLabelHtml}
  </svg>`;

  let badgeHtml = "";
  if (n >= 2 && hist[n - 1].score >= 85 && hist[n - 2].score >= 85) {
    badgeHtml = `<div class="mock-badge">🎉 受験予約レベル到達（2回連続85%以上）</div>`;
  }

  const recent = hist.slice().reverse().slice(0, 10);
  let rows = "";
  recent.forEach(d => {
    const dt = new Date(d.t);
    const dateStr = `${dt.getFullYear()}/${String(dt.getMonth() + 1).padStart(2, "0")}/${String(dt.getDate()).padStart(2, "0")}`;
    rows += `<tr><td>${dateStr}</td><td>${d.score}%</td><td>${esc(weakestDomain(d.perDomain))}</td></tr>`;
  });
  const table = `<table class="progress"><tr><th>日付</th><th>スコア</th><th>最弱分野</th></tr>${rows}</table>`;

  return `<div class="card" id="mock-chart-wrap" style="position:relative">
    <h2>模擬試験の推移</h2>
    ${badgeHtml}
    ${svg}
    <div id="mock-tooltip" class="mock-tooltip" style="display:none;position:absolute;"></div>
    ${table}
  </div>`;
}
function showMockTip(evt, idx) {
  const d = mockHistoryChartData[idx];
  const tip = document.getElementById("mock-tooltip");
  const wrap = document.getElementById("mock-chart-wrap");
  if (!d || !tip || !wrap) return;
  tip.innerHTML = `<div><strong>${fmtMD(d.t)}</strong></div><div>スコア: ${d.score}%</div><div>最弱分野: ${esc(weakestDomain(d.perDomain))}</div>`;
  tip.style.display = "block";
  const rect = wrap.getBoundingClientRect();
  let x = evt.clientX - rect.left + 12;
  let y = evt.clientY - rect.top - 10;
  x = Math.max(4, Math.min(x, rect.width - 210));
  tip.style.left = x + "px";
  tip.style.top = y + "px";
  evt.stopPropagation();
}
function hideMockTip() {
  const tip = document.getElementById("mock-tooltip");
  if (tip) tip.style.display = "none";
}

/* ===== 模擬試験 ===== */
const MOCK_TOTAL = 60, MOCK_LIMIT_SEC = 90 * 60;
function startMock() {
  const counts = {};
  let assigned = 0;
  const keys = Object.keys(DOMAINS);
  for (const d of keys) {
    counts[d] = Math.round(MOCK_TOTAL * DOMAINS[d].weight / 100);
    assigned += counts[d];
  }
  counts[5] += MOCK_TOTAL - assigned;
  let qs = [];
  for (const d of keys) {
    const pool = shuffle(QUESTIONS.filter(q => q.domain == d));
    qs = qs.concat(pool.slice(0, Math.min(counts[d], pool.length)));
  }
  qs = shuffle(qs);
  beginSession("mock", qs, MOCK_LIMIT_SEC);
}

/* ===== セッション共通 ===== */
function permuteQuestion(q) {
  const perm = shuffle(q.choices.map((_, i) => i));
  return {
    ...q,
    choices: perm.map(i => q.choices[i]),
    answer: q.answer.map(a => perm.indexOf(a)),
  };
}

function beginSession(mode, questions, limitSec) {
  questions = questions.map(permuteQuestion);
  session = {
    mode, questions, idx: 0,
    answers: new Array(questions.length).fill(null),
    limitSec: limitSec || null,
    remainSec: limitSec || null,
    timerId: null,
    checked: false,
    curSel: new Set(),
  };
  if (limitSec) {
    session.timerId = setInterval(() => {
      session.remainSec--;
      updateTimer();
      if (session.remainSec <= 0) { finishMock(); }
    }, 1000);
  }
  renderQuestion();
}

function updateTimer() {
  if (!session || session.remainSec === null) { $hdr.innerHTML = ""; return; }
  const m = Math.floor(session.remainSec / 60), s = session.remainSec % 60;
  const warn = session.remainSec < 600 ? " warn" : "";
  $hdr.innerHTML = `<span class="timer${warn}">残り ${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}</span>`;
}

function modeLabel() {
  return { practice: "分野別練習", mock: "模擬試験", review: "弱点復習", spaced: "今日の復習" }[session.mode];
}

function renderQuestion() {

    choicesHtml += `<button class="choice${sel}" data-i="${i}" onclick="toggleChoice(${i})">${esc(c)}</button>`;

  $app.innerHTML = `

      <div class="qtext">${esc(q.q)}</div>

      <div id="feedback"></div>
      <div class="nav-row">
        <button onclick="quitSession()">中断してホームへ</button>
        <div style="display:flex;gap:8px">
          ${isMock && session.idx > 0 ? '<button onclick="mockPrev()">← 前へ</button>' : ""}
          <button class="primary" id="main-btn" onclick="mainAction()">${isMock ? (session.idx === total - 1 ? "採点する" : "次へ →") : "回答する"}</button>
        </div>
      </div>
    </div>`;

  if (isMock && session.answers[session.idx]) {
    session.curSel = new Set(session.answers[session.idx].sel);
    refreshChoices();
  }
  session.checked = false;
}

function toggleChoice(i) {
  if (session.checked) return;
  const q = session.questions[session.idx];
  const isMulti = q.answer.length > 1;
  if (isMulti) {
    session.curSel.has(i) ? session.curSel.delete(i) : session.curSel.add(i);
  } else {
    session.curSel = new Set([i]);
  }
  refreshChoices();
}

function refreshChoices() {
  document.querySelectorAll("#choices .choice").forEach(btn => {
    const i = Number(btn.dataset.i);
    btn.classList.toggle("selected", session.curSel.has(i));
  });
}

function mainAction() {
  const isMock = session.mode === "mock";
  if (isMock) {
    saveCurrentMockAnswer();
    if (session.idx === session.questions.length - 1) { finishMock(); }
    else { session.idx++; session.curSel = new Set(); renderQuestion(); }
    return;
  }
  if (!session.checked) { checkAnswer(); }
  else { nextPractice(); }
}

function checkAnswer() {
  if (session.curSel.size === 0) { alert("選択肢を選んでください"); return; }
  const q = session.questions[session.idx];
  const sel = [...session.curSel];
  const correct = sameSet(sel, q.answer);
  recordAnswer(q.id, correct);
  session.answers[session.idx] = { sel, correct };
  session.checked = true;

  document.querySelectorAll("#choices .choice").forEach(btn => {
    const i = Number(btn.dataset.i);
    if (q.answer.includes(i)) btn.classList.add("correct");
    else if (session.curSel.has(i)) btn.classList.add("wrong");
  });

  document.getElementById("feedback").innerHTML = `
    <div class="expl ${correct ? "" : "ng"}">
      <div class="verdict ${correct ? "ok" : "ng"}">${correct ? "✔ 正解" : "✘ 不正解"}</div>
      ${esc(q.expl)}
    </div>`;
  const btn = document.getElementById("main-btn");
  btn.textContent = session.idx === session.questions.length - 1 ? "結果を見る" : "次の問題 →";
}

function nextPractice() {
  if (session.idx === session.questions.length - 1) { finishPractice(); return; }
  session.idx++;
  session.curSel = new Set();
  renderQuestion();
}

function finishPractice() {
  stopTimer();
  const answered = session.answers.filter(Boolean);
  const correct = answered.filter(a => a.correct).length;
  const pct = answered.length ? Math.round(correct / answered.length * 100) : 0;
  $app.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>${modeLabel()} 終了</h2>
      <div class="score-big ${pct >= 70 ? "pass" : "fail"}">${pct}%</div>
      <p class="muted">${answered.length}問中 ${correct}問正解</p>
      <div class="nav-row" style="justify-content:center">
        <button class="primary" onclick="switchTab('home')">ホームへ</button>
      </div>
    </div>`;
  session = null;
}

function saveCurrentMockAnswer() {
  const q = session.questions[session.idx];
  const sel = [...session.curSel];
  session.answers[session.idx] = { sel, correct: sameSet(sel, q.answer) };
}
function mockPrev() {
  saveCurrentMockAnswer();
  session.idx--;
  session.curSel = new Set(session.answers[session.idx] ? session.answers[session.idx].sel : []);
  renderQuestion();
}

function finishMock() {
  stopTimer();
  if (session.answers[session.idx] === null && session.curSel.size > 0) saveCurrentMockAnswer();

  let correct = 0;
  const perDomain = {};
  session.questions.forEach((q, i) => {
    const a = session.answers[i];
    const ok = a ? a.correct : false;
    recordAnswer(q.id, ok);
    if (ok) correct++;
    perDomain[q.domain] = perDomain[q.domain] || { t: 0, c: 0 };
    perDomain[q.domain].t++;
    if (ok) perDomain[q.domain].c++;
  });
  const total = session.questions.length;
  const pct = Math.round(correct / total * 100);

  const mh = loadMockHistory();
  mh.push({ t: Date.now(), score: pct, correct, total, perDomain });
  saveMockHistory(mh);

  let rows = "";
  for (const d of Object.keys(DOMAINS)) {
    if (!perDomain[d]) continue;
    const e = perDomain[d];
    const dp = Math.round(e.c / e.t * 100);
    rows += `<tr><td>${d}. ${esc(DOMAINS[d].name)}</td><td>${e.c}/${e.t}</td>
      <td><div class="bar"><div style="width:${dp}%"></div></div></td><td>${dp}%</td></tr>`;
  }

  let wrongHtml = "";
  session.questions.forEach((q, i) => {
    const a = session.answers[i];
    if (a && a.correct) return;
    wrongHtml += `<div class="browse-item">
      <div><span class="pill">分野${q.domain}</span>${esc(q.q)}</div>
      <div class="ans">正解: ${q.answer.map(x => esc(q.choices[x])).join(" / ")}</div>
      <div class="ex">${esc(q.expl)}</div>
    </div>`;
  });

  $app.innerHTML = `
    <div class="card" style="text-align:center">
      <h2>模擬試験 結果</h2>
      <div class="score-big ${pct >= 70 ? "pass" : "fail"}">${pct}%</div>
      <p class="muted">${total}問中 ${correct}問正解 — ${pct >= 85 ? "受験レベル到達。この調子で仕上げる" : pct >= 70 ? "合格ライン相当。85%を目指して弱点を潰す" : "まだ演習不足。弱点復習+ノート再読へ"}</p>
    </div>
    <div class="card">
      <h3>分野別スコア</h3>
      <table class="progress"><tr><th>分野</th><th>正解</th><th></th><th>正答率</th></tr>${rows}</table>
    </div>
    ${wrongHtml ? `<div class="card"><h3>間違えた問題の解説</h3>${wrongHtml}</div>` : ""}
    <div class="nav-row" style="justify-content:center">
      <button class="primary" onclick="switchTab('home')">ホームへ</button>
    </div>`;
  session = null;
}

function quitSession() {
  if (confirm("セッションを中断してホームに戻りますか?（模擬試験の場合、回答は破棄されます）")) {
    stopTimer();
    session = null;
    switchTab('home');
  }
}

/* ===== 全問ブラウズ ===== */
function renderBrowse() {
  stopTimer();
  session = null;
  let html = "";
  for (const d of Object.keys(DOMAINS)) {
    const qs = QUESTIONS.filter(q => q.domain == d);
    let items = "";
    qs.forEach((q, i) => {
      items += `<div class="browse-item">
        <div><strong>Q${i + 1}.</strong> ${esc(q.q)}</div>
        <div class="ans">正解: ${q.answer.map(x => esc(q.choices[x])).join(" / ")}</div>
        <div class="ex">${esc(q.expl)}</div>
      </div>`;
    });
    html += `<div class="card"><h3>分野${d}: ${esc(DOMAINS[d].name)}（${qs.length}問・配点${DOMAINS[d].weight}%）</h3>${items}</div>`;
  }
  $app.innerHTML = html;
}

document.addEventListener("click", hideMockTip);

// Init
renderStudy(1);
</script>
</body>
</html>
